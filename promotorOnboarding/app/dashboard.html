/* ═══════════════════════════════════════════════════════════════
   RENDER: CERTIFICATION TAB
   ═══════════════════════════════════════════════════════════════ */
function renderCertification() {
  if (CertState.loading || CertState.records === null) {
    return '<div class="page-header"><div><div class="page-title">Certification Tracker</div><div class="page-subtitle">Loading\u2026</div></div></div>' +
      '<div class="card"><div class="card-body"><div style="color:var(--text4);font-size:13px;padding:20px 0">Fetching certification data\u2026</div></div></div>';
  }

  var records = CertState.records || [];
  if (!records.length) {
    return '<div class="page-header"><div><div class="page-title">Certification Tracker</div><div class="page-subtitle">Monitor your green certification progress</div></div></div>' +
      '<div class="card"><div class="card-body"><div style="color:var(--text4);font-size:13px;padding:20px 0;text-align:center">No certification records found.</div></div></div>';
  }

  var PHASES = ['Mandate Signed','Requirement Mapping','Document Collection','Gap Analysis','Remediation','Final Assessment','Certification Issued'];
  var STATUS_PHASE_MAP = {
    'mandate signed':1,'requirement mapping':2,'document collection':3,
    'gap analysis':4,'remediation':5,'final assessment':6,'certification issued':7
  };

  function buildTrack(completedPhases) {
    // completedPhases = array of phase labels that are done
    var doneSet = {};
    completedPhases.forEach(function(p) { doneSet[p.trim()] = true; });
    // The next phase after all done ones is "active"
    var activePhaseIdx = 0;
    for (var i = 0; i < PHASES.length; i++) {
      if (doneSet[PHASES[i]]) activePhaseIdx = i + 1;
    }
    var nextActive = activePhaseIdx; // 0-based index of active phase
    var track = PHASES.map(function(label, i) {
      var state = doneSet[label] ? 'done' : (i === nextActive ? 'active' : 'pending');
      var dotLabel = state === 'done' ? '✓' : (i + 1);
      var statusLabel = state === 'done' ? 'Completed' : state === 'active' ? 'In progress' : 'Not started';
      return '<div class="prog-step ' + state + '"><div class="prog-dot ' + state + '">' + dotLabel + '</div><div class="prog-info"><div class="prog-label">' + label + '</div><div class="prog-status ' + state + '">' + statusLabel + '</div></div></div>';
    }).join('');
    var currentLabel = PHASES[nextActive] || PHASES[PHASES.length - 1];
    return { track: track, doneCount: activePhaseIdx, currentLabel: currentLabel };
  }

  var active = records[CertState.activeIdx] || records[0];
  var t = buildTrack(active.completedPhases || []);
  var allDone = t.doneCount === PHASES.length;
  var badgeCls = allDone ? 'tag-green' : t.doneCount >= 5 ? 'tag-blue' : t.doneCount >= 3 ? 'tag-amber' : 'tag-grey';

  var optionsHtml = records.map(function(r, i) {
    return '<option value="' + i + '"' + (i === CertState.activeIdx ? ' selected' : '') + '>' + esc(r.project || 'Project ' + (i+1)) + '</option>';
  }).join('');

  var selectorHtml =
    '<div class="pipe-selector-wrap">' +
      '<span class="pipe-selector-label">Select Project</span>' +
      '<div class="pipe-selector">' +
        '<select onchange="selectCertProject(parseInt(this.value))">' + optionsHtml + '</select>' +
        '<span class="pipe-selector-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></span>' +
      '</div>' +
      '<div class="pipe-selector-chip">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' +
        esc(active.project || '') +
      '</div>' +
    '</div>';

  return '<div class="page-header"><div><div class="page-title">Certification Tracker</div>' +
    '<div class="page-subtitle">Monitor your green certification progress</div></div>' +
    '<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="reloadCertification()">&#8635; Refresh</button></div>' +
    selectorHtml +
    '<div class="card"><div class="card-body">' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">' +
      '<div style="font-size:15px;font-weight:700;color:var(--text1);flex:1">' + esc(active.project || '') + '</div>' +
      '<span class="tag ' + badgeCls + '">' + esc(allDone ? 'Certified' : t.currentLabel) + '</span>' +
    '</div>' +
    '<div class="progress-track">' + t.track + '</div>' +
    '<div class="cert-footer"><span>Phase ' + t.doneCount + ' of ' + PHASES.length + ' completed &nbsp;·&nbsp; <em>Read-only — managed by CCM expert</em></span></div>' +
    '</div></div>';
}

  return header +
    selectorHtml +
    '<div class="info-box amber" style="margin:0 0 14px">Pipeline is managed by the CCM expert. Promoter action is available at <strong>Phase 1 — Interest Received</strong> (Unlock / Deny) and <strong>Phase 3 — Data Room Access</strong> (Grant / Deny).</div>' +
    '<div class="kanban">' + cols + '</div>';

/* ── Custom confirm (replaces native confirm() to avoid Zoho URL in title) ── */
var _ccmConfirmCb = null;
function ccmConfirm(title, msg, okLabel, okClass) {
  return new Promise(function(resolve) {
    _ccmConfirmCb = resolve;
    document.getElementById('ccmConfirmTitle').textContent  = title;
    document.getElementById('ccmConfirmMsg').textContent    = msg;
    var btn = document.getElementById('ccmConfirmOkBtn');
    btn.textContent  = okLabel || 'Confirm';
    btn.className    = 'btn btn-sm ' + (okClass || 'btn-green');
    document.getElementById('ccmConfirmOverlay').style.display = 'flex';
  });
}
function ccmConfirmResolve(result) {
  document.getElementById('ccmConfirmOverlay').style.display = 'none';
  if (_ccmConfirmCb) { _ccmConfirmCb(result); _ccmConfirmCb = null; }
}

function pipelineApproveAction(id, action) {
  if (!id) return;
  var label = action === 'approve' ? 'Unlock' : 'Deny';
  var okClass = action === 'approve' ? 'btn-green' : 'btn-red';
  ccmConfirm(
    action === 'approve' ? 'Unlock Project' : 'Deny Interest',
    action === 'approve' ? 'Unlock this project for the investor?' : 'Deny this investor\'s interest?',
    label, okClass
  ).then(function(ok) {
    if (!ok) return;
    var actionVal = action === 'approve' ? 'Unlock' : 'Deny';
    ZOHO.CREATOR.DATA.updateRecordById({
      app_name: ZOHO_CFG.appName, report_name: ZOHO_CFG.reports.pipeline,
      id: id, payload: { data: { Actions_field: actionVal, Grant_Access: '' } }
    }).then(function() {
      toast(action === 'approve' ? 'Project Unlocked successfully' : 'Interest Denied', 'success');
      reloadPipeline();
    }).catch(function(e) {
      // console.error('[CCM] pipelineApproveAction failed:', e);
      toast('Action failed. Please try again.', 'error');
    });
  });
}

  if (!id) return;
  var label = action === 'approve' ? 'Grant' : 'Deny';
  var okClass = action === 'approve' ? 'btn-green' : 'btn-red';

function markNotifRead(id) {
  var n = (NotifState.records || []).find(function(x) { return String(x.id) === String(id); });

  // Optimistic UI — remove row immediately
  var row = document.getElementById('notif-row-' + id);

  // Update Zoho record
  ZOHO.CREATOR.DATA.updateRecordById({
    app_name:    ZOHO_CFG.appName,

/* ═══════════════════════════════════════════════════════════════
   RATINGS METHODOLOGY DIALOG
   ═══════════════════════════════════════════════════════════════ */
function openRatingDialog() {
  var nec = (typeof OnboardingState !== 'undefined') ? OnboardingState.necessary : null;
  var COMPONENTS = [
    { key:'DPR_Feasibility_Study',  label:'DPR / Feasibility Study' },
    { key:'Land_Site',              label:'Land & Site' },
    { key:'Permits_Approvals',      label:'Permits & Approvals' },
    { key:'Technoloy_Equipment',    label:'Technology & Equipment' },
    { key:'EPC_Construction_Team',  label:'EPC / Construction Team' },
    { key:'Equity_Committed',       label:'Equity Committed' },
    { key:'Green_Certification',    label:'Green Certification' },
    { key:'Impact_Assessment',      label:'Impact Assessment' },
    { key:'Market_Demand',          label:'Market Demand' }
  ];

  var stars = calcReadinessStars();
  var scoreVal = stars !== null ? stars.toFixed(1) : '—';

  var starsHtml = '';
  if (stars !== null) {
    for (var i = 1; i <= 5; i++) {
      if (stars >= i)            starsHtml += '<span style="font-size:26px;color:#F59E0B">&#9733;</span>';
      else if (stars >= i - 0.5) starsHtml += '<span style="font-size:26px;color:#F59E0B;opacity:.5">&#9733;</span>';
      else                       starsHtml += '<span style="font-size:26px;color:#D1D5DB">&#9733;</span>';
    }
  }

  var rowsHtml = COMPONENTS.map(function(c) {
    var val = nec ? (nec[c.key] || '').toString().toLowerCase() : '';
    var badge, pts;
    if (val === 'ready')                          { badge = '<span class="rating-row-badge rbadge-ready">Ready</span>';   pts = '2 pts'; }
    else if (val === 'partial')                    { badge = '<span class="rating-row-badge rbadge-partial">Partial</span>'; pts = '1 pt'; }
    else if (val === 'not ready' || val === 'notready') { badge = '<span class="rating-row-badge rbadge-not">Not Ready</span>'; pts = '0 pts'; }
    else                                           { badge = '<span class="rating-row-badge rbadge-na">Not Set</span>';    pts = '—'; }
    return '<div class="rating-row">' +
      '<div class="rating-row-label">' + esc(c.label) + '</div>' +
      badge +
      '<div style="font-size:11px;color:var(--text4);min-width:36px;text-align:right">' + pts + '</div>' +
    '</div>';
  }).join('');

  var html =
    '<div class="rating-dialog-backdrop" id="ratingDialogBackdrop" onclick="closeRatingDialog(event)">' +
      '<div class="rating-dialog" onclick="event.stopPropagation()">' +
        '<div class="rating-dialog-header">' +
          '<div>' +
            '<div class="rating-dialog-title">Ratings Methodology</div>' +
            '<div class="rating-dialog-sub">Project Readiness Score — 9 components × max 2 pts each = 18 pts → 5 stars</div>' +
          '</div>' +
          '<button class="rating-dialog-close" onclick="closeRatingDialog()">&#215;</button>' +
        '</div>' +
        '<div class="rating-dialog-score">' +
          '<div class="rating-dialog-stars">' + starsHtml + '</div>' +
          '<div><div class="rating-dialog-score-val">' + scoreVal + ' <span style="font-size:16px;font-weight:500;color:var(--text3)">/ 5</span></div>' +
            '<div class="rating-dialog-score-sub">Project Readiness Score</div></div>' +
        '</div>' +
        '<div class="rating-dialog-body">' +
          '<div class="rating-legend">' +
            '<div class="rating-legend-item"><div class="rating-legend-dot" style="background:#10B981"></div>Ready = 2 pts</div>' +
            '<div class="rating-legend-item"><div class="rating-legend-dot" style="background:#F59E0B"></div>Partial = 1 pt</div>' +
            '<div class="rating-legend-item"><div class="rating-legend-dot" style="background:#D1D5DB"></div>Not Ready = 0 pts</div>' +
          '</div>' +
          rowsHtml +
        '</div>' +
      '</div>' +
    '</div>';

  var wrap = document.createElement('div');
  wrap.id = 'ratingDialogWrap';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
}

function closeRatingDialog(e) {
  if (e && e.target !== document.getElementById('ratingDialogBackdrop')) return;
  var wrap = document.getElementById('ratingDialogWrap');
  if (wrap) wrap.remove();
}

/* ═══════════════════════════════════════════════════════════════
   TOGGLE PROJECT LOCK
   ═══════════════════════════════════════════════════════════════ */
function toggleProjectLock(projectId) {
  var projects = ProjectState.projects || [];
  var p = projects.filter(function(x) { return String(x.id) === String(projectId); })[0];
  if (!p) return;

  var newLocked = !p.locked;

  // Optimistic UI — update icon immediately
  var btn = document.getElementById('lock-btn-' + projectId);
  if (btn) {
    btn.className = 'lock-badge ' + (newLocked ? 'lock-active' : 'lock-open');
    btn.style.opacity = '0.5';
    btn.style.pointerEvents = 'none';
    var lockSvgClosed = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>';
    var lockSvgOpen   = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 019.9-1"/></svg>';
    btn.innerHTML = (newLocked ? lockSvgClosed : lockSvgOpen) +
      '<div class="lock-tooltip">' + (newLocked ? '&#128274; Identity Hidden — Disclosed on Acceptance by Promoter' : '&#128275; Identity Visible — Click to Lock') + '</div>';
  }

  // Update Zoho record
  ZOHO.CREATOR.DATA.updateRecordById({
    app_name:    ZOHO_CFG.appName,
    report_name: ZOHO_CFG.reports.project,
    id:          projectId,
    payload:     { data: { Lock: newLocked } }
  }).then(function(res) {
    if (res && res.code === 3000) {
      // Persist to local state
      p.locked = newLocked;
      p._raw.Lock = newLocked;
    } else {
      // Revert on failure
      p.locked = !newLocked;
      // console.warn('[CCM] toggleProjectLock failed:', res);
    }
    if (btn) { btn.style.opacity = ''; btn.style.pointerEvents = ''; }
    if (State.activeTab === 'projects') rerenderTab('projects');
  }).catch(function(e) {
    p.locked = !newLocked;
    // console.error('[CCM] toggleProjectLock error:', e);
    if (btn) { btn.style.opacity = ''; btn.style.pointerEvents = ''; }
    if (State.activeTab === 'projects') rerenderTab('projects');
  });
}

function showTab(tabId) {
  State.activeTab = tabId;
  document.getElementById('mainContent').innerHTML = RENDERERS[tabId] ? RENDERERS[tabId]() : '';
  updateSidebarActive();
  window.scrollTo(0, 0);

  // Auto-fetch profile from Zoho every time Profile tab is opened
  if (tabId === 'profile' && !ProfileState.loading) {
    reloadProfile();
  }
  // Auto-fetch projects when Projects tab is opened (always refresh)
  if (tabId === 'projects' && !ProjectState.loading) {
    reloadProjects();
  }
  // On Dashboard: re-fetch projects if user navigates back to dashboard after they already loaded
  if (tabId === 'dashboard' && !ProjectState.loading && ProjectState.projects !== null) {
    reloadProjects();
  }
  // Onboarding tab: fetch all step records from Zoho
  if (tabId === 'onboarding' && !OnboardingState.loading && typeof ZOHO !== 'undefined' && ZOHO.CREATOR) {
    reloadOnboarding();
  }
  // Notifications tab: fetch from All_Notifications
  if (tabId === 'notifications' && NotifState.records === null && !NotifState.loading && typeof ZOHO !== 'undefined' && ZOHO.CREATOR) {
    reloadNotifications();
  }
  // Certification tab: fetch from All_Certification_Trackers
  if (tabId === 'certification' && CertState.records === null && !CertState.loading && typeof ZOHO !== 'undefined' && ZOHO.CREATOR) {
    reloadCertification();
  }
  // Pipeline tab: fetch from All_Investment_Pipelines
  if (tabId === 'pipeline' && PipelineState.records === null && !PipelineState.loading && typeof ZOHO !== 'undefined' && ZOHO.CREATOR) {
    reloadPipeline();
  }
  // Data Room tab: load images after render
  if (tabId === 'dataroom') {
    setTimeout(loadDataRoomImages, 80);
  }
}

function rerenderTab(tabId) {
  if (State.activeTab === tabId) {
    document.getElementById('mainContent').innerHTML = RENDERERS[tabId]();
    updateSidebarActive();
  }
}

/* ── Active currency — reads Funding_Currency_Type from registration record ── */
function activeCurrency() {
  var rec = ProfileState.record || {};
  var raw = rec.Currency || rec.Funding_Currency_Type || '';
  var first = Array.isArray(raw) ? raw[0] : raw;
  if (first && typeof first === 'object') first = first.value || first.display_value || '';
  first = String(first || '').trim().toUpperCase();
  return first || (SettingsState && SettingsState.currency) || 'INR';
}

/* ── Currency symbol map ── */
var CURRENCY_SYMBOLS = {
  INR: '₹',  USD: '$',   EUR: '€',  GBP: '£',  SGD: 'S$',
  AED: 'AED',JPY: '¥',  CNY: '¥',  RUB: '₽',  SEK: 'kr',
  NOK: 'kr', NZD: 'NZ$', DKK: 'kr', CAD: 'CA$', AUD: 'A$',
  CHF: 'CHF',HKD: 'HK$', MXN: 'MX$',BRL: 'R$', ZAR: 'R'
};

/* ── Exchange-rate cache (loaded from All_Currency on first currency save) ── */
var CurrencyRatesState = {
  rates:   null,   // { USD: 1, INR: 83.5, EUR: 0.92, ... }  (all relative to USD)
  loading: false,
  promise: null
};

/**
 * Fetch All_Currency records (Active_Status = Enable) and build:
 *   CurrencyRatesState.rates  — { CODE: exchangeRate, … }
 * Also enriches CURRENCY_SYMBOLS from the Symbol field in the dataset.
 * Returns a Promise that resolves to the rates object.
 */
function loadCurrencyRates() {
  if (CurrencyRatesState.rates) {
    // console.log('[CCM][Currency] Rates already cached:', CurrencyRatesState.rates);
    return Promise.resolve(CurrencyRatesState.rates);
  }
  if (CurrencyRatesState.promise) return CurrencyRatesState.promise;
  if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.DATA) {
    // console.warn('[CCM][Currency] Zoho SDK not ready — cannot load rates');
    return Promise.reject('Zoho SDK not ready');
  }
  // console.log('[CCM][Currency] Fetching All_Currency from Zoho...');
  CurrencyRatesState.loading = true;
  CurrencyRatesState.promise = ZOHO.CREATOR.DATA.getRecords({
    app_name:    ZOHO_CFG.appName,
    report_name: ZOHO_CFG.reports.currency,
    page: 1, per_page: 200
  }).then(function(resp) {
    var data = Array.isArray(resp) ? resp : (resp && resp.data ? resp.data : []);
    // console.log('[CCM][Currency] Raw rows received:', data.length);
    var rates = {};
    var skipped = 0;
    data.forEach(function(row) {
      /* Active_Status is a Zoho dropdown (type 12) — may return object or string */
      var activeVal = row.Active_Status;
      if (activeVal && typeof activeVal === 'object') activeVal = activeVal.value || activeVal.key || '';
      if (activeVal && String(activeVal).trim() !== 'Enable') { skipped++; return; }
      /* Currency_Code is also a dropdown (type 12) */
      var code = row.Currency_Code;
      if (code && typeof code === 'object') code = code.value || code.key || '';
      code = String(code || '').trim().toUpperCase();
      var rate = parseFloat(row.Exchange_Rate || 0);
      if (!code || isNaN(rate) || rate <= 0) { skipped++; return; }
      rates[code] = rate;
      /* Enrich symbol map from the Symbol field */
      var sym = (row.Symbol || '').trim();
      if (sym && !CURRENCY_SYMBOLS[code]) CURRENCY_SYMBOLS[code] = sym;
    });
    /* INR is the base — 1 INR = 1 INR */
    rates['INR'] = 1;
    CurrencyRatesState.rates   = rates;
    CurrencyRatesState.loading = false;
    CurrencyRatesState.promise = null;
    /* Apply conversion immediately so all visible fields update */
    applyCurrencyConversion();
    return rates;
  }).catch(function(e) {
    // console.warn('[CCM][Currency] loadCurrencyRates FAILED:', e);
    CurrencyRatesState.loading = false;
    CurrencyRatesState.promise = null;
    return {};
  });
  return CurrencyRatesState.promise;
}

/**
 * Re-render all tabs that display currency values so fmtCapital() picks up the new currency.
 * No state mutation needed — all values stay as INR in state; conversion happens at render time
 * via convertFromINRBase() inside fmtCapital() and setNum().
 */
function applyCurrencyConversion() {
  var cur   = activeCurrency();
  var rates = CurrencyRatesState.rates;
  var rate  = rates ? rates[cur] : null;
  // console.log('[CCM][Currency] applyCurrencyConversion — selected:', cur, '| rate (1', cur, '= X INR):', rate);

  if (!rates || !rate) {
    // console.warn('[CCM][Currency] Rates not loaded yet — skipping conversion');
    return;
  }

  /* ── 1. Dashboard project cards — re-map fundingVal / projectCost ── */
  var projConverted = 0;
  if (ProjectState && ProjectState.projects) {
    ProjectState.projects.forEach(function(p) {
      if (p._raw) {
        var rawCost = p._raw.Total_Project_Cost || p._raw.Total_Project_Cost_USD || p._raw.Total_Capital_Required;
        if (rawCost) {
          var fmt = fmtCapital(rawCost) || '\u2014';
          p.fundingVal  = fmt;
          p.projectCost = fmt;
          projConverted++;
          // console.log('[CCM][Currency] Project "' + (p.name || p.id) + '" cost: INR ' + rawCost + ' → ' + fmt);
        }
      }
    });
  }
  // console.log('[CCM][Currency] Projects re-mapped:', projConverted);

  /* ── 2. Onboarding requirements — log field values ── */
  if (OnboardingState && OnboardingState.requirements) {
    var req = OnboardingState.requirements;
    var capFields = {
      'Total_Project_Cost_USD': req.Total_Project_Cost_USD,
      'Grant_Subsidy_Sought_USD': req.Grant_Subsidy_Sought_USD,
      'Equity_Required_USD': req.Equity_Required_USD,
      'Debt_Required_USD': req.Debt_Required_USD,
      'Promoter_Equity_USD': req.Promoter_Equity_USD
    };
    // console.log('[CCM][Currency] Onboarding capital fields (INR base values):');
    Object.keys(capFields).forEach(function(k) {
      if (capFields[k] != null && capFields[k] !== '') {
        var converted = convertFromINRBase(parseFloat(capFields[k]));
        // console.log('  ', k, ':', capFields[k], 'INR →', converted.toFixed(2), cur);
      }
    });
  }

  /* ── 3. Profile — Annual Turnover ── */
  if (ProfileState && ProfileState.record) {
    var trn = ProfileState.record.Annual_Turnover;
    if (trn) {
      // console.log('[CCM][Currency] Annual Turnover: INR', trn, '→', convertFromINRBase(parseFloat(trn)).toFixed(2), cur);
    }
  }

  /* ── 4. Pipeline amounts ── */
  if (PipelineState && PipelineState.records) {
    var pipCount = 0;
    PipelineState.records.forEach(function(inv) {
      var rawAmt = inv.raw && (inv.raw.Interest_Amount || inv.raw.Investment_Amount || inv.raw.Amount);
      if (rawAmt) {
        var converted = convertFromINRBase(parseFloat(rawAmt));
        // console.log('[CCM][Currency] Pipeline "' + (inv.alias || inv.id) + '" amount: INR', rawAmt, '→', converted.toFixed(2), cur);
        pipCount++;
      }
    });
    if (pipCount === 0) console.log('[CCM][Currency] Pipeline: no amount fields found');
  }

  /* ── 5. Patch any data-currency inputs currently visible in the DOM ── */
  var inputs = document.querySelectorAll('input[data-currency="true"]');
  // console.log('[CCM][Currency] DOM currency inputs currently visible:', inputs.length);
  inputs.forEach(function(el) {
    var raw = el.value.replace(/,/g, '').trim();
    var inrVal = parseFloat(raw);
    if (!isNaN(inrVal) && inrVal !== 0) {
      var converted = convertFromINRBase(inrVal);
      el.value = converted.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      // console.log('[CCM][Currency] DOM input #' + el.id + ': INR', inrVal, '→', converted.toFixed(2), cur);
    }
  });

  /* ── 6. Re-render active tab ── */
  var affectedTabs = ['dashboard', 'onboarding', 'pipeline', 'profile'];
  affectedTabs.forEach(function(t) {
    if (State && State.activeTab === t) {
      // console.log('[CCM][Currency] Re-rendering tab:', t);
      rerenderTab(t);
    }
  });
  // console.log('[CCM][Currency] Conversion complete ✓');
}

/* ── Indian digit grouping: 1,23,45,678 ── */
function fmtIndian(n) {
  var s = Math.abs(Math.floor(n)).toString();
  if (s.length <= 3) return s;
  var last3 = s.slice(-3);
  var rest = s.slice(0, -3);
  var groups = [];
  while (rest.length > 2) { groups.unshift(rest.slice(-2)); rest = rest.slice(0, -2); }
  if (rest) groups.unshift(rest);
  return groups.join(',') + ',' + last3;
}

/* ── Western digit grouping: 1,234,567 ── */
function fmtWestern(n) {
  return Math.abs(Math.floor(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

/**
 * Convert a value from INR (base) to the currently selected display currency.
 * Exchange_Rate = "1 INR = X target currency"
 * So: Converted = BaseAmount × ExchangeRate
 */
function convertFromINRBase(n) {
  var cur = activeCurrency();
  if (cur === 'INR') return n;
  var rates = CurrencyRatesState.rates;
  if (!rates || !rates[cur]) return n;
  return n * rates[cur];
}

/**
 * Convert a value from the selected display currency back to INR for storage.
 * Base = Converted ÷ ExchangeRate
 */
function convertToINRBase(n) {
  var cur = activeCurrency();
  if (cur === 'INR') return n;
  var rates = CurrencyRatesState.rates;
  if (!rates || !rates[cur]) return n;
  return n / rates[cur];
}

/* ── Format a raw INR number with selected-currency symbol + conversion ── */
function fmtCapital(rawNum) {
  if (rawNum == null || rawNum === '') return null;
  var n = parseFloat(rawNum);
  if (isNaN(n)) return null;
  var cur = activeCurrency();
  var sym = CURRENCY_SYMBOLS[cur] || cur + ' ';
  n = convertFromINRBase(n);
  var formatted = n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return sym + formatted;
}

/* Shorten Zoho timeline values — strip parenthetical e.g. "Immediate (Less Than 3 Months)" → "Immediate" */
function shortTimeline(val) {
  var s = zvp(val);
  return s ? s.replace(/\s*\(.*?\)\s*/g, '').trim() : s;
}

/* Safe value extractor for any Zoho field type */
function zvp(val) {
  if (!val || val === false) return '';
  if (Array.isArray(val)) return val.map(function(v){ return zvp(v); }).join(', ');
  if (typeof val === 'object') return val.url || val.display_value || val.value || val.file_name || '';
  return String(val);
}

/* Extract the raw URL/path string from a Zoho file field value */
function zohoRawUrl(field) {
  if (!field || field === false) return '';
  if (typeof field === 'string') return field;
  if (Array.isArray(field)) return field.length ? zohoRawUrl(field[0]) : '';
  return field.url || field.file_path || field.filePath || field.file_name || '';
}

/* Extract all {rawUrl, name} entries from a multi-file Zoho field */
function zohoFileEntries(field) {
  if (!field || field === false) return [];
  var arr = Array.isArray(field) ? field : [field];
  return arr.map(function(f) {
    var raw = (typeof f === 'string') ? f : (f.url || f.file_path || f.filePath || f.file_name || '');
    var m = raw.match(/[?&]filepath=([^&]+)/);
    var name = m ? decodeURIComponent(m[1]).replace(/^\d+_/, '') : (raw.split('/').pop() || 'File');
    return { rawUrl: raw, name: name };
  }).filter(function(f){ return !!f.rawUrl; });
}

/* Called from Data Room buttons/thumbnails — reads data attrs to avoid inline escaping issues */
function drOpenFile(el) {
  var raw  = el.getAttribute('data-raw')  || '';
  var name = el.getAttribute('data-name') || 'file';
  zohoOpenFile(raw, name, el.id || null);
}

/* Parse a Zoho Creator file download URL into ZOHO.CREATOR.FILE.readFile config.
   URL pattern: /api/v2.1/[owner]/[app]/report/[report]/[recordId]/[field]/download?filepath=[path] */
function parseZohoFileUrl(rawUrl) {
  var m = rawUrl.match(/\/api\/v2\.1\/[^/]+\/([^/]+)\/report\/([^/]+)\/([^/]+)\/([^/]+)\/download/);
  if (!m) return null;
  var fpMatch = rawUrl.match(/[?&]filepath=([^&]+)/);
  return {
    app_name:    m[1],
    report_name: m[2],
    id:          m[3],
    field_name:  m[4],
    file_path:   fpMatch ? decodeURIComponent(fpMatch[1]) : ''
  };
}

/* Open / download a Zoho Creator file using the official ZOHO.CREATOR.FILE.readFile API.
   Check browser console (F12) for [CCM-FILE] logs to diagnose any issues. */
function zohoOpenFile(rawUrl, filename, btnId) {
  if (!rawUrl) return;

  var btn      = btnId ? document.getElementById(btnId) : null;
  var origHtml = btn ? btn.innerHTML : null;
  var fname    = filename || 'download';

  function setBtnState(loading) {
    if (!btn) return;
    if (loading) {
      btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Loading…';
      btn.style.pointerEvents = 'none';
    } else {
      btn.innerHTML = origHtml;
      btn.style.pointerEvents = '';
    }
  }

  function triggerDownload(blob) {
    // console.log('[CCM-FILE] triggerDownload — blob size:', blob.size, 'type:', blob.type);
    var objUrl = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href     = objUrl;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(objUrl); }, 4000);
    setBtnState(false);
  }

  function fallback(reason) {
    // console.warn('[CCM-FILE] fallback triggered — reason:', reason, '— rawUrl:', rawUrl);
    setBtnState(false);
    var absUrl = /^https?:\/\//i.test(rawUrl) ? rawUrl : (window.location.origin + rawUrl);
    window.open(absUrl, '_blank');
  }

  // Check SDK availability
  var ZOHO_OK = typeof ZOHO !== 'undefined' && ZOHO.CREATOR;
  var FILE     = ZOHO_OK && ZOHO.CREATOR.FILE ? ZOHO.CREATOR.FILE : null;
  // console.log('[CCM-FILE] ZOHO:', !!ZOHO_OK, '| ZOHO.CREATOR.FILE:', !!FILE, '| readFile:', !!(FILE && FILE.readFile));

  if (!FILE || typeof FILE.readFile !== 'function') {
    fallback('ZOHO.CREATOR.FILE.readFile not available');
    return;
  }

  // Parse URL to extract config params
  var cfg = parseZohoFileUrl(rawUrl);
  // console.log('[CCM-FILE] parsed config:', JSON.stringify(cfg), '| rawUrl:', rawUrl);

  if (!cfg || !cfg.report_name || !cfg.id || !cfg.field_name) {
    fallback('URL parse failed');
    return;
  }

  setBtnState(true);
  // console.log('[CCM-FILE] calling readFile with:', JSON.stringify(cfg));

  FILE.readFile(cfg).then(function(response) {
    // Detect MIME type from filename extension or content signature
    function guessMime(name, content) {
      var ext = (name || '').split('.').pop().toLowerCase();
      var mimeMap = {
        pdf:'application/pdf', png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg',
        gif:'image/gif', webp:'image/webp', svg:'image/svg+xml',
        doc:'application/msword', docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
        xls:'application/vnd.ms-excel', xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        ppt:'application/vnd.ms-powerpoint', zip:'application/zip', txt:'text/plain'
      };
      if (mimeMap[ext]) return mimeMap[ext];
      // Detect from content signature
      if (typeof content === 'string' && content.startsWith('%PDF')) return 'application/pdf';
      return 'application/octet-stream';
    }

    function rawStringToBlob(str, mime) {
      var ab = new ArrayBuffer(str.length);
      var ia = new Uint8Array(ab);
      for (var i = 0; i < str.length; i++) ia[i] = str.charCodeAt(i) & 0xff;
      return new Blob([ab], { type: mime });
    }

    if (response instanceof Blob) {
      triggerDownload(response);
    } else if (response && response.data instanceof Blob) {
      triggerDownload(response.data);
    } else if (typeof response === 'string' && response.length > 0) {
      // Raw binary string returned directly by readFile
      var mime = guessMime(fname, response);
      triggerDownload(rawStringToBlob(response, mime));
    } else if (response && typeof response.data === 'string' && response.data.length > 0) {
      var mime2 = guessMime(fname, response.data);
      triggerDownload(rawStringToBlob(response.data, mime2));
    } else if (response && (response.url || response.download_url)) {
      setBtnState(false);
      window.open(response.url || response.download_url, '_blank');
    } else {
      fallback('unexpected response');
    }
  }).catch(function(e) {
    // console.error('[CCM-FILE] readFile threw:', e);
    fallback('readFile threw: ' + e);
  });
}

/* Use ZOHO.CREATOR.UTIL.setImageData to load an authenticated image into a DOM <img> element.
   imgEl    — actual DOM <img> element (must be in document)
   rawUrl   — the /api/v2.1/... URL string from getRecords
   callback — called after image is loaded (optional) */
function setZohoImage(imgEl, rawUrl, callback) {
  if (!imgEl || !rawUrl) return;
  var UTIL = (typeof ZOHO !== 'undefined' && ZOHO.CREATOR && ZOHO.CREATOR.UTIL) ? ZOHO.CREATOR.UTIL : null;
  if (!UTIL || typeof UTIL.setImageData !== 'function') return;
  UTIL.setImageData(imgEl, rawUrl, function() {
    if (callback) callback(imgEl);
  });
}

/* Create a hidden DOM <img>, call setImageData, invoke fn(src) via callback */
function whenImageLoaded(rawUrl, fn) {
  if (!rawUrl) return;
  // Attach a hidden img to body so setImageData gets a real DOM element
  var img = document.createElement('img');
  img.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none';
  document.body.appendChild(img);
  setZohoImage(img, rawUrl, function(el) {
    var src = el.src;
    document.body.removeChild(img);
    if (src && src !== window.location.href) fn(src);
  });
}

/* Slider state */
var _sliderPos = {};

function gGoTo(pid, idx) {
  var track = document.getElementById('gtrack-' + pid);
  var dots  = document.getElementById('gdots-' + pid);
  var count = document.getElementById('gcount-' + pid);
  if (!track) return;
  var n = track.children.length;
  idx = (idx + n) % n;
  _sliderPos[pid] = idx;
  track.style.transform = 'translateX(-' + (idx * 100) + '%)';
  if (dots) {
    dots.querySelectorAll('.gslider-dot').forEach(function(d, i){ d.classList.toggle('active', i === idx); });
  }
  if (count) count.textContent = (idx + 1) + ' / ' + n;

/* Map a raw Zoho project_creation_Report record → card + detail data */
function mapProjectRecord(r) {
  var addr  = r.Address || {};
  var city  = zvp(addr.district_city)  || zvp(addr.District_City)  || '';
  var state = zvp(addr.state_province) || zvp(addr.State_Province) || '';
  var loc   = [city, state].filter(Boolean).join(', ') || 'India';

  var stage = zvp(r.Project_Stage) || 'Design';
  var stageClassMap = {
    'Planning':'stage-design', 'Design':'stage-design',
    'Construction':'stage-construction', 'Operation':'stage-operation', 'Completed':'stage-operation'
  };

  var certList = Array.isArray(r.Present_Certification) ? r.Present_Certification
               : (r.Present_Certification ? [r.Present_Certification] : []);
  var certLabel = certList.length ? zvp(certList[0]) : null;

  var statusRaw = zvp(r.Status) || zvp(r.Project_Status) || '';
  var statusVal = statusRaw || (certLabel ? 'Certified' : 'Pending Review');
  var statusMap = { 'Live':'tag-green','Certified':'tag-blue','Revision':'tag-amber',
                    'Pending Review':'tag-grey','Draft':'tag-grey','Approved':'tag-blue' };

  var area = r.Built_up_Area_sq_ft
    ? Number(r.Built_up_Area_sq_ft).toLocaleString() + ' Sq M'
    : (r.Total_Super_Built_Up_Area ? Number(r.Total_Super_Built_Up_Area).toLocaleString() + ' Sq M'
    : (r.Total_Land_Area ? Number(r.Total_Land_Area).toLocaleString() + ' Sq M' : '\u2014'));

  // Raw /api/v2.1/... URL from getRecords — passed to setImageData for auth'd loading
  var imgRawUrl = zohoRawUrl(r.Project_Cover_Image);

  var uspRaw = r.USPs || '';
  var feats  = typeof uspRaw === 'string'
    ? uspRaw.split(',').map(function(s){ return s.trim(); }).filter(Boolean).slice(0, 3)
    : (Array.isArray(uspRaw) ? uspRaw.slice(0, 3) : []);

  var created = r.Added_Time || r.Created_Time || '';
  if (created) {
    try { created = new Date(created).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }); }
    catch(e) { created = ''; }
  }

  var cost    = r.Total_Project_Cost || r.Total_Project_Cost_USD || r.Total_Capital_Required;
  cost = cost ? (fmtCapital(cost) || '\u2014') : '\u2014';
  var capType = Array.isArray(r.Capital_Type) ? r.Capital_Type.join(' · ') : zvp(r.Capital_Type);

  return {
    id:          r.ID,
    name:        zvp(r.project_name) || 'Untitled Project',
    category:    zvp(r.category) || 'Green Building',
    subtype:     zvp(r.Subtype) || '',
    location:    loc,
    created:     created,
    fundingVal:  cost,
    fundingType: capType || '\u2014',
    projectCost: cost,
    area:        area,
    timeline:    shortTimeline(r.Expected_Timeline) || stage,
    interests:   0,
    status:      statusVal,
    statusClass: statusMap[statusVal] || 'tag-grey',
    canEdit:     !['Live','Certified'].includes(statusVal),
    stage:       stage,
    stageClass:  stageClassMap[stage] || 'stage-design',
    cert:        certLabel,
    certClass:   certLabel ? 'badge-cert' : '',
    features:     feats,
    locked:       !!(r.Lock === true || r.Lock === 'true' || r.Lock === 1 || r.Lock === '1'),
    img:          '',              // populated async by loadProjectImages() via setImageData
    _imgRawUrl:   imgRawUrl,       // /api/v2.1/... URL from getRecords for setImageData
    _raw:         r                // raw record for detail page
  };
}

/* Fetch projects — no-criteria fetch, Zoho row permissions return only this user's records */
function fetchProjectsByRegistrationId(registrationId) {
  if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.DATA) {
    return Promise.resolve([]);
  }

  return ZOHO.CREATOR.DATA.getRecords({
    app_name:    ZOHO_CFG.appName,
    report_name: ZOHO_CFG.reports.project,
    page: 1, per_page: 200
  }).then(function(r) {
    var all = (r && r.code === 3000 && Array.isArray(r.data)) ? r.data : [];
    // console.log('[CCM Projects] no-criteria fetch returned', all.length, 'records');
    // If registrationId known, filter client-side as extra safety
    if (registrationId && all.length > 0) {
      var filtered = all.filter(function(rec) {
        var pid = rec['promotor.ID'];
        // Zoho returns lookup as object {ID:'...'} or plain string
        if (pid && typeof pid === 'object') pid = pid.ID || pid.id || '';
        if (Array.isArray(pid)) pid = pid[0];
        return String(pid) === String(registrationId);
      });
      // Only apply filter if it actually matches something — otherwise show all (own records)
      return filtered.length > 0 ? filtered : all;
    }
    return all;
  }).catch(function(e) {
    // console.error('[CCM Projects] fetch failed:', e);
    return [];
  });
}

function reloadPipeline() {
  if (PipelineState.loading) return;

  // Wait for profile if not ready
  if (!ProfileState.recordId) {
    var attempts = 0;
    var wait = setInterval(function() {
      attempts++;
      if (ProfileState.recordId) { clearInterval(wait); reloadPipeline(); }
      else if (attempts > 30)    { clearInterval(wait); PipelineState.records = []; if (State.activeTab === 'pipeline') rerenderTab('pipeline'); }
    }, 300);
    return;
  }

  PipelineState.loading = true;
  if (State.activeTab === 'pipeline') rerenderTab('pipeline');

  ZOHO.CREATOR.DATA.getRecords({
    app_name:    ZOHO_CFG.appName,
    report_name: ZOHO_CFG.reports.pipeline,
    criteria:    'Promoter == ' + ProfileState.recordId,
    page:        1,
    per_page:    200
  }).then(function(resp) {
    // console.log('[CCM] reloadPipeline raw resp:', JSON.stringify(resp).slice(0, 500));
    var data = (resp && resp.code === 3000 && Array.isArray(resp.data)) ? resp.data
             : (Array.isArray(resp) ? resp : []);

    // Helper: extract string from any Zoho field value (handles lookup objects)
    function pipeStr(v) {
      if (!v) return '';
      if (typeof v === 'string') return v;
      if (typeof v === 'number') return String(v);
      if (typeof v === 'object') return v.zc_display_value || v.display_value || v.project_name || v.name || v.Name || v.title || v.Title || v.ID || '';
      return String(v);
    }

    PipelineState.records = data.map(function(r) {
      var proj         = pipeStr(r.Project_Reference) || pipeStr(r.Project) || pipeStr(r.Project_Name) || '';
      var projNumber   = pipeStr(r.Project_Number) || pipeStr(r.Project_No) || pipeStr(r.Project_ID) || '';
      var alias        = pipeStr(r.Alias_Name) || pipeStr(r.Investor_Alias) || pipeStr(r.Investor) || pipeStr(r.Investor_Name) || r.ID || '—';
      var investorType = pipeStr(r.Investor_Type) || pipeStr(r.Type) || '';
      var amount       = pipeStr(r.Interest_Amount) || pipeStr(r.Investment_Amount) || pipeStr(r.Amount) || '';
      var ndaStatus    = pipeStr(r.NDA_Status) || pipeStr(r.NDA) || '';
      var nextStep     = pipeStr(r.Next_Step) || pipeStr(r.Next_Action) || '';
      var meetingDate  = pipeStr(r.Meeting_Date) || pipeStr(r.Next_Meeting) || '';
      if (meetingDate) {
        try { meetingDate = new Date(meetingDate).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }); } catch(e) {}
      }
      var statusNote   = pipeStr(r.Status_Note) || pipeStr(r.Action_Text) || pipeStr(r.Current_Status) || '';

      // Phases — derived from multiselect "Phase" field
      // Zoho returns semicolon-separated string or array of checked options
      var PHASE_LABELS = ['Interest Received','Investor Meeting','Data Room Access','Due Diligence','Final Negotiation','Definitive Agreement'];
      var phases = [0,0,0,0,0,0];

      var phaseRaw = r.Phase || r.Current_Phase || '';
      var checkedPhases = [];
      if (Array.isArray(phaseRaw)) {
        checkedPhases = phaseRaw.map(function(v){ return pipeStr(v).toLowerCase(); });
      } else if (typeof phaseRaw === 'string' && phaseRaw) {
        checkedPhases = phaseRaw.split(';').map(function(s){ return s.trim().toLowerCase(); });
      }

      if (checkedPhases.length) {
        // All checked = done (1), last checked = active (2), rest = not started (0)
        var lastCheckedIdx = -1;
        PHASE_LABELS.forEach(function(lbl, i) {
          var match = checkedPhases.some(function(c){ return c.includes(lbl.toLowerCase()); });
          if (match) { phases[i] = 1; lastCheckedIdx = i; }
        });
        // Mark the last checked phase as active
        if (lastCheckedIdx >= 0) phases[lastCheckedIdx] = 2;
      }

      var lastActivity = r.Last_Activity || r.Modified_Time || r.Added_Time || '';
      if (lastActivity) {
        try {
          var d = new Date(lastActivity);
          lastActivity = d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
        } catch(e) {}
      }

      var actionsField = pipeStr(r.Actions_field) || pipeStr(r.Actions) || '';
      var grantAccess  = pipeStr(r.Grant_Access) || '';

      var showApprove         = (r.Promoter_Action_Required === true || r.Promoter_Action_Required === 'true')
                                || actionsField.toLowerCase().includes('approve') || actionsField.toLowerCase().includes('deny');
      var showDisclosurePhase2 = actionsField.toLowerCase().includes('disclosure') || actionsField.toLowerCase().includes('phase 2');

      // Derive last action label from stored field values
      var lastAction = '';
      if (grantAccess)   lastAction = grantAccess === 'Grant' ? 'Access Granted' : (grantAccess === 'Deny' ? 'Access Denied' : grantAccess);
      else if (actionsField) lastAction = actionsField === 'Unlock' ? 'Project Unlocked' : (actionsField === 'Deny' ? 'Interest Denied' : actionsField);

      return {
        id:                   r.ID,
        project:              proj,
        projNumber:           projNumber,
        alias:                alias,
        investorType:         investorType,
        amount:               amount,
        ndaStatus:            ndaStatus,
        nextStep:             nextStep,
        meetingDate:          meetingDate,
        statusNote:           statusNote,
        phases:               phases,
        lastActivity:         lastActivity,
        actionText:           statusNote,
        showApprove:          showApprove,
        showDisclosurePhase2: showDisclosurePhase2,
        actionsField:         actionsField,
        grantAccess:          grantAccess,
        lastAction:           lastAction,
        raw:                  r
      };
    });

    PipelineState.loading = false;
    if (State.activeTab === 'pipeline') rerenderTab('pipeline');
  }).catch(function(e) {
    // console.warn('[CCM] reloadPipeline failed:', e);
    PipelineState.loading = false;
    PipelineState.records = [];
    if (State.activeTab === 'pipeline') rerenderTab('pipeline');
  });
}

function reloadNotifications() {
  if (NotifState.loading) return;
  NotifState.loading = true;
  if (State.activeTab === 'notifications') rerenderTab('notifications');

  ZOHO.CREATOR.DATA.getRecords({
    app_name:    ZOHO_CFG.appName,
    report_name: ZOHO_CFG.reports.notifications,
    criteria:    'Status == "unread"',
    page:        1,
    per_page:    200
  }).then(function(resp) {
    var data = (resp && resp.data) ? resp.data : (Array.isArray(resp) ? resp : []);
    NotifState.records = data.map(function(r, i) {
      var rawTime = r.Notification_Time || r.Added_Time || r.Created_Time || '';
      var fmtTime = '';
      if (rawTime) {
        try {
          var d = new Date(rawTime);
          var now = new Date();
          var diffMs = now - d;
          var diffMin = Math.floor(diffMs / 60000);
          var diffHr  = Math.floor(diffMs / 3600000);
          var diffDay = Math.floor(diffMs / 86400000);
          if (diffMin < 1)       fmtTime = 'Just now';
          else if (diffMin < 60) fmtTime = diffMin + ' min ago';
          else if (diffHr  < 24) fmtTime = diffHr  + ' hr ago';
          else if (diffDay < 7)  fmtTime = diffDay + ' day' + (diffDay > 1 ? 's' : '') + ' ago';
          else                   fmtTime = d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) + ' · ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
        } catch(e) { fmtTime = rawTime; }
      }
      return {
        id:    r.ID || i,
        read:  false,   // only fetching unread
        title: r.Title        || r.Notification_Title || r.Subject || 'Notification',
        sub:   r.Message      || r.Description        || r.Body    || '',
        time:  fmtTime || rawTime
      };
    });
    NotifState.loading = false;
    if (State.activeTab === 'notifications') rerenderTab('notifications');
    updateNotifBadge();
  }).catch(function(e) {
    // console.warn('[CCM] reloadNotifications failed:', e);
    NotifState.loading = false;
    NotifState.records = [];
    if (State.activeTab === 'notifications') rerenderTab('notifications');
  });
}

        ProjectState.loading = false;
        ProjectState.projects = [];
        if (State.activeTab === 'projects') rerenderTab('projects');

    if (CurrencyRatesState.rates) {
      applyCurrencyConversion();
    } else {
      loadCurrencyRates(); // will call applyCurrencyConversion() internally on success
    }
  }).catch(function(err) {
    // console.error('[CCM] reloadProjects catch:', err);
    ProjectState.loading  = false;
    ProjectState.projects = [];
    ProjectState.error    = 'Failed to load projects.';
    if (State.activeTab === 'projects') rerenderTab('projects');

}

/* ═══════════════════════════════════════════════════════════════
   ZOHO INIT — get login email → fetch registration record
   ═══════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════
   ZOHO INIT — get login email → fetch registration record
   ═══════════════════════════════════════════════════════════════ */
function initZoho() {
  var tries = 0;
  var timer = setInterval(function() {
    tries++;
    if (typeof ZOHO !== 'undefined' && ZOHO.CREATOR && ZOHO.CREATOR.UTIL && ZOHO.CREATOR.DATA) {
      clearInterval(timer);
      ZOHO.CREATOR.UTIL.getInitParams().then(function(params) {
        var email = (params && (params.loginUser || params.login_id || params.loginuser || params.currentUser || '')) || '';
        // console.log('[CCM] initZoho params:', JSON.stringify(params), '→ email:', email);
        ProfileState.loginEmail = email;
        // update navbar user info from Zoho
        if (email) {
          document.getElementById('navName').textContent = email.split('@')[0];
          document.getElementById('navMeta').textContent = email;
          document.getElementById('navAvatar').textContent = email.charAt(0).toUpperCase();
          document.getElementById('sidebarName').textContent = email.split('@')[0];
          document.getElementById('sidebarMeta').textContent = email;
          document.getElementById('sidebarAvatar').textContent = email.charAt(0).toUpperCase();
        }
        if (ZOHO_CFG.appName === 'climate-capital-market' && params.appLinkName) {
          ZOHO_CFG.appName = params.appLinkName;
        }
        // Pre-fetch registration record so Profile tab is ready instantly
        // Check sessionStorage cache first to avoid redundant API call
        if (email && !ProfileState.record) {
          ProfileState.loading = true;
          var ssKey = 'ccm_promotor_id_' + email;
          var cachedId = sessionStorage.getItem(ssKey);
          if (cachedId) {
            ProfileState.recordId = cachedId;
            // console.log('[CCM] Promoter ID loaded from session cache:', cachedId);
          }
          fetchRegistrationByEmail(email).catch(function(){ return null; }).then(function(rec) {
            ProfileState.record = rec;
            if (rec) {
              ProfileState.recordId = rec.ID;
              // Persist promotor ID to sessionStorage for instant access on reload
              try { sessionStorage.setItem(ssKey, rec.ID); } catch(e) {}
              // console.log('[CCM] Promoter ID cached in session:', rec.ID);
              // Update navbar with real name from record
              var name = rec.Promoter_Name || {};
              var fullName = [name.first_name, name.last_name].filter(Boolean).join(' ') || email.split('@')[0];
              document.getElementById('navName').textContent = fullName;
              document.getElementById('navAvatar').textContent = (name.first_name||email).charAt(0).toUpperCase();
              document.getElementById('sidebarName').textContent = fullName;
              document.getElementById('sidebarAvatar').textContent = (name.first_name||email).charAt(0).toUpperCase();
            }
            // Re-render active tab with live data
            ProfileState.loading = false;
            if (State.activeTab === 'profile') {
              document.getElementById('mainContent').innerHTML = renderProfile();
            } else if (State.activeTab === 'onboarding') {
              document.getElementById('mainContent').innerHTML = renderOnboarding();
            }
            refreshDashboard();
            // Always kick off project fetch after profile loads (needed for dashboard stats)
            reloadProjects();
            // Fetch onboarding step records in background after profile loads
            if (!OnboardingState.fetched && !OnboardingState.loading) {
              reloadOnboarding();
            }
            // Fetch notifications in background so sidebar badge count is accurate
            if (NotifState.records === null && !NotifState.loading) {
              reloadNotifications();
            }
            // Pre-load exchange rates; applyCurrencyConversion() is called automatically on success
            loadCurrencyRates();
          });
        }
      }).catch(function(){});
    }
    if (tries > 40) {
      clearInterval(timer);
      // SDK never loaded — clear loading states so UI is usable
      ProfileState.loading  = false;
      ProjectState.loading  = false;
      ProjectState.projects = [];
      refreshDashboard();
    }
  }, 200);
}

/* Fetch registration record — PRIMARY: no-criteria fetch (Zoho row permissions return own records only)
   FALLBACK: email filter if multiple records returned                                              */
function fetchRegistrationByEmail(email) {
  if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.DATA) {
    return Promise.resolve(null);
  }
  // console.log('[CCM Profile] fetchRegistration — email:', email, '| app:', ZOHO_CFG.appName);

  function pickRecord(records) {
    if (!records || !records.length) return null;
    if (records.length === 1) {
      // console.log('[CCM Profile] single record returned — using it. Keys:', Object.keys(records[0]));
      return records[0];
    }
    // Multiple records — try email match
    var em = (email || '').toLowerCase();
    if (em) {
      var match = records.filter(function(r) {
        return (r.Company_email || r['Company_Email'] || '').toLowerCase() === em;
      });
      if (match.length) { console.log('[CCM Profile] matched by email:', em); return match[0]; }
    }
    // console.log('[CCM Profile] multiple records, no email match — using first');
    return records[0];
  }

  // Step 1: no-criteria fetch — Zoho row permissions return only this user's records
  return ZOHO.CREATOR.DATA.getRecords({
    app_name:    ZOHO_CFG.appName,
    report_name: ZOHO_CFG.reports.registration,
    page: 1, per_page: 200
  }).then(function(res) {
    // console.log('[CCM Profile] no-criteria fetch code:', res && res.code, 'count:', res && res.data && res.data.length);
    if (res && res.code === 3000 && Array.isArray(res.data) && res.data.length > 0) {
      return pickRecord(res.data);
    }
    // console.warn('[CCM Profile] no records returned');
    return null;
  }).catch(function(err) {
    // console.error('[CCM Profile] fetch failed:', err);
    return null;
  });
}

function renderProfile() {
  var rec = ProfileState.record;  // raw Zoho record — all fields directly

  /* ── helpers ── */
  function zv(val) {
    if (val === null || val === undefined || val === false || val === '') return '';
    if (Array.isArray(val)) return val.join(', ');
    if (typeof val === 'object') return val.url || val.value || val.display_value || '';
    return String(val);
  }
  function rv(label, rawVal, isLink, href) {
    var d = zv(rawVal);
    var vh = d
      ? (isLink ? '<a href="' + (href || esc(d)) + '" target="_blank">' + esc(d) + '</a>' : esc(d))
      : '<span class="empty">—</span>';
    return '<div class="pf-row"><div class="pf-label">' + label + '</div><div class="pf-value' + (d ? '' : ' empty') + '">' + vh + '</div></div>';
  }
  function rvFull(label, rawVal) {
    var d = zv(rawVal);
    return '<div class="pf-row gfull"><div class="pf-label">' + label + '</div><div class="pf-value' + (d ? '' : ' empty') + '">' + (d ? esc(d) : '<span class="empty">—</span>') + '</div></div>';
  }

  /* ── extract fields directly from Zoho record ── */
  var promName   = (rec && rec.Promoter_Name) ? rec.Promoter_Name : {};
  var addr       = (rec && rec.Address)       ? rec.Address       : {};
  if (rec) { console.log('[CCM Profile] Address keys:', Object.keys(addr), '| raw:', JSON.stringify(addr)); }

  var r            = rec || {};
  var firstName    = zv(promName.first_name)  || zv(r.first_name)  || '';
  var lastName     = zv(promName.last_name)   || zv(r.last_name)   || '';
  var email        = zv(r.Company_email)      || '';
  var mobile       = zv(r.Mobile_Number)      || '';
  var designation  = zv(r.Designation)        || '';
  var linkedin     = zv(r.LinkedIn_profile)   || '';
  var companyName  = zv(r.Company_Name)       || '';
  var companyType  = zv(r.Company_Type)       || '';
  var website      = zv(r.Website)            || '';
  var cin          = zv(r.CIN)               || '';
  var gstin        = zv(r.GSTIN)             || '';
  var description  = zv(r.Description)       || '';
  var addrLine1    = zv(addr.address_line_1)  || zv(addr.Address_Line_1) || '';
  var city         = zv(addr.district_city)   || zv(addr.District_City)  || '';
  var state        = zv(addr.state_province)  || zv(addr.State_Province) || '';
  var postalCode   = zv(addr.postal_Code)     || zv(addr.postal_code)    || zv(addr.Postal_Code) || '';
  var country      = zv(addr.country)         || zv(addr.Country)        || '';
  var yearEst      = r.Year_Established          ? String(r.Year_Established)         : '';
  var employees    = r.No_of_Employees           ? String(r.No_of_Employees)          : '';
  var projComp     = r.No_of_Projects_Completed  ? String(r.No_of_Projects_Completed) : '';
  var turnover     = r.Annual_Turnover       ? (fmtCapital(r.Annual_Turnover) || String(r.Annual_Turnover) + ' ' + capitalLabel()) : '';
  var sectorRaw    = r.Sector_Focus || null;

    : (!rec && ProfileState.loginEmail

        rv('First Name',       firstName) +
        rv('Last Name',        lastName)  +
        rv('Company Email',    email,     true, 'mailto:' + esc(email)) +
        rv('Mobile',           mobile)    +
        rv('Designation',      designation) +

          '<input type="text" id="pfe_postal" value="' + esc(p.postalCode) + '" maxlength="20" placeholder="PIN code"/>' +
        '</div>' +

        '<div class="f">' +
          '<label class="fl" for="pfe_country">Country</label>' +
          '<input type="text" id="pfe_country" value="' + esc(p.country || 'India') + '" maxlength="100" placeholder="India"/>' +
        '</div>' +

      '</div></div>' +
    '</div>' +

    /* ── Save row ── */
    '<div class="profile-save-row" style="margin-bottom:32px">' +
      '<button class="btn btn-green" onclick="saveProfileUpdate()">' +
        svgIcon('check') + 'Save Changes' +
      '</button>' +
      '<button class="btn btn-ghost" onclick="showTab(\'profile\')">Cancel</button>' +
      '<span class="profile-save-msg" id="pfe_msg"></span>' +
    '</div>';
}

/* ═══════════════════════════════════════════════════════════════
   SAVE PROFILE UPDATE → Zoho updateRecordById
   ═══════════════════════════════════════════════════════════════ */
function saveProfileUpdate() {
  var msg = document.getElementById('pfe_msg');
  if (msg) msg.textContent = 'Saving…';

  // Collect sector checkboxes
  var sectorVals = [];
  document.querySelectorAll('input[name="pf_sector"]:checked').forEach(function(cb){ sectorVals.push(cb.value); });

  function gv(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }

  var linkedin = gv('pfe_linkedin');
  var website  = gv('pfe_website');

  var payload = {
    data: {
      Promoter_Name: { first_name: gv('pfe_fname'), last_name: gv('pfe_lname') },
      Mobile_Number:    gv('pfe_mobile'),
      Designation:      gv('pfe_desig'),
      LinkedIn_profile: linkedin && linkedin.startsWith('http') ? { url: linkedin, title: linkedin } : undefined,
      Company_Name:     gv('pfe_company'),
      Company_Type:     gv('pfe_ctype'),
      Website:          website && website.startsWith('http') ? { url: website, title: website } : undefined,
      CIN:              gv('pfe_cin'),
      GSTIN:            gv('pfe_gstin'),
      Description:      gv('pfe_desc'),
      Address: {
        address_line_1: gv('pfe_addr1'),
        district_city:  gv('pfe_city'),
        state_province: gv('pfe_state'),
        postal_Code:    gv('pfe_postal'),
        country:        gv('pfe_country') || 'India'
      },
      Year_Established:         gv('pfe_year')      ? parseInt(gv('pfe_year'))      : undefined,
      No_of_Employees:          gv('pfe_employees') ? parseInt(gv('pfe_employees')) : undefined,
      No_of_Projects_Completed: gv('pfe_projects')  ? parseInt(gv('pfe_projects'))  : undefined,
      Annual_Turnover: (function(){
        var raw = parseFloat(gv('pfe_turnover').replace(/,/g,''));
        if (isNaN(raw) || raw === 0) return undefined;
        return typeof convertToINRBase === 'function' ? parseFloat(convertToINRBase(raw).toFixed(2)) : raw;
      })(),
      Sector_Focus:             sectorVals.length > 0 ? sectorVals[0] : undefined
    }
  };

  // Strip undefined keys
  Object.keys(payload.data).forEach(function(k){
    if (payload.data[k] === undefined || payload.data[k] === null || payload.data[k] === '') delete payload.data[k];
  });

  // console.log('[CCM Dashboard] updateProfile payload:', JSON.stringify(payload, null, 2));

  // Check Zoho available
  if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.DATA) {
    if (msg) { msg.style.color = 'var(--red)'; msg.textContent = 'Zoho SDK not available — changes not saved to Zoho.'; }
    // Still update local DATA
    updateLocalProfile(payload.data);
    return;
  }

  if (!ProfileState.recordId) {
    // No record ID yet — try to fetch first
    if (msg) msg.textContent = 'Looking up record…';
    fetchRegistrationByEmail(ProfileState.loginEmail || gv('pfe_email')).then(function(rec) {
      if (rec) {
        ProfileState.record   = rec;
        ProfileState.recordId = rec.ID;
        doUpdate(payload, msg);
      } else {
        if (msg) { msg.style.color = 'var(--red)'; msg.textContent = 'No existing record found. Please submit the full onboarding form first.'; }
      }
    });
    return;
  }

  doUpdate(payload, msg);
}

function doUpdate(payload, msgEl) {
  ZOHO.CREATOR.DATA.updateRecordById({
    app_name:    ZOHO_CFG.appName,
    report_name: ZOHO_CFG.reports.registration,
    id:          ProfileState.recordId,
    payload:     payload
  }).then(function(res) {
    // console.log('[CCM Dashboard] updateRecordById response:', res);
    if (res && res.code === 3000) {
      if (msgEl) { msgEl.style.color = 'var(--accent)'; msgEl.textContent = '✓ Profile updated successfully!'; }
      updateLocalProfile(payload.data);
      // Refresh record from Zoho
      fetchRegistrationByEmail(ProfileState.loginEmail).then(function(rec){ if(rec){ ProfileState.record = rec; ProfileState.recordId = rec.ID; } });
    } else {
      if (msgEl) { msgEl.style.color = 'var(--red)'; msgEl.textContent = 'Error: ' + (res && res.error ? JSON.stringify(res.error) : 'Update failed'); }
    }
  }).catch(function(err) {
    // console.error('[CCM Dashboard] updateRecordById error:', err);
    if (msgEl) { msgEl.style.color = 'var(--red)'; msgEl.textContent = 'Error: ' + (err.message || 'Network error'); }
  });
}

/* Sync changes back to DATA.profile (local fallback) */
function updateLocalProfile(d) {
  var n = d.Promoter_Name || {};
  if (n.first_name) DATA.profile.firstName = n.first_name;
  if (n.last_name)  DATA.profile.lastName  = n.last_name;
  if (d.Mobile_Number)    DATA.profile.mobile          = d.Mobile_Number;
  if (d.Designation)      DATA.profile.designation     = d.Designation;
  if (d.LinkedIn_profile) DATA.profile.linkedin        = d.LinkedIn_profile.url || d.LinkedIn_profile;
  if (d.Company_Name)     DATA.profile.companyName     = d.Company_Name;
  if (d.Company_Type)     DATA.profile.companyType     = d.Company_Type;
  if (d.Website)          DATA.profile.website         = d.Website.url || d.Website;
  if (d.CIN)              DATA.profile.cin             = d.CIN;
  if (d.GSTIN)            DATA.profile.gstin           = d.GSTIN;
  if (d.Description)      DATA.profile.description     = d.Description;
  if (d.Address) {
    if (d.Address.address_line_1) DATA.profile.addressLine1 = d.Address.address_line_1;
    if (d.Address.district_city)  DATA.profile.city         = d.Address.district_city;
    if (d.Address.state_province) DATA.profile.state        = d.Address.state_province;
    if (d.Address.postal_code || d.Address.postal_Code) DATA.profile.postalCode = d.Address.postal_code || d.Address.postal_Code;
    if (d.Address.country)        DATA.profile.country      = d.Address.country;
  }
  if (d.Year_Established)         DATA.profile.yearEstablished   = d.Year_Established;
  if (d.No_of_Employees)          DATA.profile.employees         = d.No_of_Employees;
  if (d.No_of_Projects_Completed) DATA.profile.projectsCompleted = d.No_of_Projects_Completed;
  if (d.Annual_Turnover)      DATA.profile.annualTurnover    = d.Annual_Turnover; /* raw INR — converted at render time */
  if (d.Sector_Focus)             DATA.profile.sectorFocus       = [d.Sector_Focus];
}

/* Reload profile from Zoho — waits for SDK if not ready yet */
function reloadProfile() {
  ProfileState.loading = true;
  if (State.activeTab === 'profile') {
    document.getElementById('mainContent').innerHTML = renderProfile();
  }

  var attempts = 0;
  function tryFetch() {
    if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.DATA) {
      if (attempts++ < 50) {
        setTimeout(tryFetch, 100);
      } else {
        ProfileState.loading = false;
        if (State.activeTab === 'profile') document.getElementById('mainContent').innerHTML = renderProfile();
      }
      return;
    }
    // fetchRegistrationByEmail uses no-criteria fetch — email is only used as tiebreaker
    fetchRegistrationByEmail(ProfileState.loginEmail).then(function(rec) {
      ProfileState.loading = false;
      ProfileState.record  = rec;
      if (rec) {
        ProfileState.recordId = rec.ID;
        // Update navbar with real name
        var name = rec.Promoter_Name || {};
        var fullName = [name.first_name, name.last_name].filter(Boolean).join(' ') || ProfileState.loginEmail || '';
        if (fullName) {
          document.getElementById('navName').textContent = fullName;
          document.getElementById('sidebarName').textContent = fullName;
          document.getElementById('navAvatar').textContent = (name.first_name || fullName).charAt(0).toUpperCase();
          document.getElementById('sidebarAvatar').textContent = (name.first_name || fullName).charAt(0).toUpperCase();
        }
      }
      if (State.activeTab === 'profile') {
        document.getElementById('mainContent').innerHTML = renderProfile();
      }
      refreshDashboard();
    });
  }

  tryFetch();
}

renderSidebar(true);
showTab('dashboard');
initZoho();

/* ── Expert Chat ─────────────────────────────────────────────── */
function openExpertChat() {
  document.getElementById('expertChatPanel').style.display = 'flex';
  document.getElementById('expertChatInput').focus();
}
function closeExpertChat() {
  document.getElementById('expertChatPanel').style.display = 'none';
}
function sendExpertChatMsg() {
  var input = document.getElementById('expertChatInput');
  var msg = (input.value || '').trim();
  if (!msg) return;
  var feed = document.getElementById('expertChatFeed');
  var ts = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  feed.innerHTML +=
    '<div style="display:flex;justify-content:flex-end;margin-bottom:8px">' +
      '<div style="max-width:75%;background:var(--accent);color:#fff;padding:8px 12px;border-radius:12px 12px 2px 12px;font-size:13px">' +
        esc(msg) +
        '<div style="font-size:10px;opacity:.7;margin-top:3px;text-align:right">' + ts + '</div>' +
      '</div>' +
    '</div>';
  feed.scrollTop = feed.scrollHeight;
  input.value = '';
  /* Auto-reply placeholder */
  setTimeout(function() {
    feed.innerHTML +=
      '<div style="display:flex;margin-bottom:8px">' +
        '<div style="max-width:75%;background:var(--bg2,#f3f4f6);color:var(--text1);padding:8px 12px;border-radius:12px 12px 12px 2px;font-size:13px">' +
          'Thank you for your message. A CCM expert will respond shortly.' +
          '<div style="font-size:10px;color:var(--text4);margin-top:3px">' + ts + '</div>' +
        '</div>' +
      '</div>';
    feed.scrollTop = feed.scrollHeight;
  }, 800);
}
</script>
