<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Promoter Dashboard — Climate Capital Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <!-- Load onboarding form styles — dashboard inline <style> overrides any conflicts -->
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:#5AF0BC; --accent-pale:#F0FFFB; --accent-border:#A7F3DC; --accent-dark:#2DD4A0;
      --blue:#2563EB; --blue-pale:#EFF6FF;
      --amber:#D97706; --amber-pale:#FFFBEB;
      --red:#DC2626; --red-pale:#FEF2F2;
      --purple:#7C3AED; --purple-pale:#F5F3FF;
      --bg:#F7F8FA; --surface:#FFFFFF; --border:#E5E7EB;
      --text1:#111827; --text2:#374151; --text3:#6B7280; --text4:#9CA3AF;
      --nav-h:56px; --sidebar-w:210px;
      --radius:8px; --radius-card:12px;
      --shadow:0 1px 3px rgba(0,0,0,.07); --shadow-md:0 4px 12px rgba(0,0,0,.08);
      /* Aliases for app.js / style.css CSS variable names */
      --r:var(--radius); --rl:var(--radius-card); --r2:10px;
      --text:var(--text1); --surface2:var(--bg); --border2:var(--border);
      --shadow-sm:var(--shadow); --accent-ring:rgba(22,163,74,.15);
      --blue-lt:var(--blue-pale); --blue-border:#BFDBFE;
      --amber-lt:var(--amber-pale); --amber-border:#FDE68A;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text1); font-size:14px; line-height:1.5; }

    /* NAVBAR */
    .navbar { position:fixed; top:0; left:0; right:0; z-index:100; height:var(--nav-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px 0 0; gap:12px; box-shadow:var(--shadow); }
    .nav-logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .nav-logo img { width:34px; height:34px; object-fit:contain; flex-shrink:0; }
    .nav-brand { font-family:'DM Sans', sans-serif; font-size:15px; font-weight:600; color:var(--text1); line-height:1.2; letter-spacing:0; white-space:nowrap; }
    .nav-brand span { display:block; font-size:10px; font-weight:400; color:var(--text3); letter-spacing:.3px; text-transform:uppercase; }
    .nav-spacer { flex:1; }
    .save-pill { display:flex; align-items:center; gap:6px; background:var(--accent-pale); border:1px solid var(--accent-border); border-radius:20px; padding:4px 10px; font-size:11px; font-weight:500; color:var(--accent); }
    .save-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); }
    .user-pill { display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px 4px 4px; cursor:pointer; }
    .user-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); color:#0a2e1e; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .user-info { font-size:12px; line-height:1.3; }
    .user-info strong { display:block; font-weight:600; color:var(--text1); }
    .user-info span { color:var(--text3); font-size:11px; }

    /* SIDEBAR */
    .sidebar { position:fixed; top:var(--nav-h); left:0; bottom:0; width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; z-index:90; }
    .sidebar-nav { padding:12px 8px; flex:1; }
    .sidebar-nav a { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:var(--radius); font-size:13px; font-weight:500; color:var(--text2); text-decoration:none; transition:all .15s; border-left:3px solid transparent; margin-bottom:2px; cursor:pointer; }
    .sidebar-nav a:hover { background:var(--accent-pale); color:var(--accent); }
    .sidebar-nav a.active { background:var(--accent-pale); color:var(--accent); border-left-color:var(--accent); font-weight:600; }
    .sidebar-nav a svg { width:16px; height:16px; flex-shrink:0; }
    .sidebar-section { font-size:10px; font-weight:600; color:var(--text4); text-transform:uppercase; letter-spacing:.06em; padding:10px 12px 4px; }
    .sidebar-foot { padding:12px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; border-radius:0 0 var(--radius) var(--radius); transition:background .15s; }
    .sidebar-foot:hover { background:var(--accent-pale); }
    .sidebar-foot .user-avatar { width:32px; height:32px; font-size:12px; }
    .sidebar-foot-info { font-size:12px; line-height:1.3; }
    .sidebar-foot-info strong { display:block; font-weight:600; }
    .sidebar-foot-info span { color:var(--text3); font-size:11px; }

    /* MAIN */
    .main { margin-top:var(--nav-h); margin-left:var(--sidebar-w); padding:24px; min-height:calc(100vh - var(--nav-h)); }

    /* TAB PANELS */
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* PAGE HEADER */
    .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
    .page-title { font-size:18px; font-weight:700; color:var(--text1); }
    .page-subtitle { font-size:13px; color:var(--text3); margin-top:2px; }

    /* CARD */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card); box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; }
    .card-head { display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border); }
    .card-badge { width:26px; height:26px; border-radius:6px; background:var(--accent); color:#0a2e1e; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .card-title-group { flex:1; }
    .card-title { font-size:14px; font-weight:600; color:var(--text1); }
    .card-subtitle { font-size:12px; color:var(--text3); margin-top:1px; }
    .card-head-actions { display:flex; align-items:center; gap:8px; }
    .card-body { padding:18px; }

    /* BUTTONS */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:var(--radius); font-size:13px; font-weight:500; font-family:inherit; border:none; cursor:pointer; transition:all .15s; text-decoration:none; }
    .btn svg { width:14px; height:14px; flex-shrink:0; }
    .btn-green  { background:var(--accent); color:#0a2e1e; }
    .btn-green:hover  { background:var(--accent-dark); }
    .btn-outline{ background:transparent; color:var(--accent); border:1px solid var(--accent-border); }
    .btn-outline:hover{ background:var(--accent-pale); }
    .btn-ghost  { background:transparent; color:var(--text2); border:1px solid var(--border); }
    .btn-ghost:hover  { background:var(--bg); }
    .btn-red    { background:var(--red-pale); color:var(--red); border:1px solid #FECACA; }
    .btn-red:hover    { background:#FEE2E2; }
    .btn-blue   { background:var(--blue-pale); color:var(--blue); border:1px solid #BFDBFE; }
    .btn-blue:hover   { background:#DBEAFE; }
    .btn-sm     { padding:4px 10px; font-size:12px; }

    /* WELCOME */
    .welcome-inner { display:flex; align-items:flex-start; gap:20px; padding:8px 0; }
    .welcome-avatar { width:64px; height:64px; border-radius:50%; background:var(--accent); color:#0a2e1e; font-size:22px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .welcome-info h2 { font-size:20px; font-weight:700; color:var(--text1); }
    .welcome-info p  { font-size:13px; color:var(--text3); margin-top:4px; }
    .welcome-info .meta { display:flex; gap:16px; margin-top:8px; flex-wrap:wrap; }
    .welcome-info .meta span { font-size:12px; color:var(--text3); display:flex; align-items:center; gap:4px; }
    .welcome-info .meta svg { width:13px; height:13px; }

    /* MANDATE TIMER */
    .mandate-timer-wrap  { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
    .mandate-timer-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
    .mandate-timer       { display:flex; align-items:center; gap:4px; background:var(--surface2); border:1.5px solid var(--accent-border); border-radius:12px; padding:8px 16px; }
    .mt-unit             { display:flex; flex-direction:column; align-items:center; min-width:36px; }
    .mt-val              { font-size:22px; font-weight:800; color:var(--text1); line-height:1; font-variant-numeric:tabular-nums; }
    .mt-lbl              { font-size:9px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }
    .mt-sep              { font-size:22px; font-weight:700; color:var(--accent); line-height:1; margin-bottom:12px; }
    .mandate-timer-since { font-size:10px; color:var(--text4); }

    /* STATS */
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
    .stat-tile { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card); padding:16px 18px; box-shadow:var(--shadow); }
    .stat-label { font-size:12px; color:var(--text3); font-weight:500; }
    .stat-value { font-size:28px; font-weight:700; margin-top:4px; line-height:1; }
    .stat-value.green { color:var(--accent); }
    .stat-value.blue  { color:var(--blue); }
    .stat-value.amber { color:var(--amber); }
    .stat-sub { font-size:11px; color:var(--text4); margin-top:4px; }

    /* PROJECTS GRID */
    .proj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:18px; }
    .pcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card); overflow:hidden; transition:box-shadow .2s,transform .2s; cursor:pointer; }
    .pcard:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .pcard-img-wrap { position:relative; height:180px; overflow:hidden; background:#1a5438; }
    .pcard-img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }
    .pcard:hover .pcard-img { transform:scale(1.04); }
    .pcard-img-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,transparent 40%,rgba(13,42,30,.6) 100%); }
    .pcard-badges { position:absolute; top:10px; left:10px; display:flex; gap:6px; flex-wrap:wrap; }
    .pbadge { padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; backdrop-filter:blur(6px); }
    .pbadge-cat  { background:rgba(13,42,30,.7); color:#a0e8c0; }
    .pbadge-cert { background:rgba(22,163,74,.25); color:#bbf7d0; border:1px solid rgba(22,163,74,.4); }
    .pbadge-soon { background:rgba(255,255,255,.12); color:rgba(255,255,255,.75); }
    .pcard-status { position:absolute; top:10px; right:10px; }
    /* LOCK BADGE */
    .lock-badge { position:relative; display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; backdrop-filter:blur(6px); cursor:pointer; flex-shrink:0; transition:background .2s, border-color .2s; }
    .lock-badge.lock-active  { background:rgba(90,240,188,.25); border:1.5px solid rgba(90,240,188,.6); }
    .lock-badge.lock-active svg { color:#5AF0BC; }
    .lock-badge.lock-open    { background:rgba(0,0,0,.45); border:1.5px solid rgba(255,255,255,.18); }
    .lock-badge.lock-open svg { color:rgba(255,255,255,.55); }
    .lock-badge:hover { background:rgba(90,240,188,.35) !important; border-color:var(--accent) !important; }
    .lock-badge:hover svg { color:#5AF0BC !important; }
    .lock-tooltip { position:absolute; bottom:calc(100% + 8px); right:0; background:#0a2e1e; color:var(--accent); font-size:11px; font-weight:600; white-space:nowrap; padding:5px 10px; border-radius:7px; pointer-events:none; opacity:0; transform:translateY(4px); transition:opacity .2s,transform .2s; z-index:99; box-shadow:0 4px 12px rgba(0,0,0,.3); }
    .lock-tooltip::after { content:''; position:absolute; top:100%; right:10px; border:5px solid transparent; border-top-color:#0a2e1e; }
    .lock-badge:hover .lock-tooltip { opacity:1; transform:translateY(0); }
    .lock-badge-inline { position:relative; display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; background:rgba(0,0,0,.45); cursor:pointer; border:1.5px solid rgba(255,255,255,.2); transition:background .2s; }
    .lock-badge-inline:hover { background:rgba(90,240,188,.2); border-color:var(--accent); }
    .lock-badge-inline svg { color:#fff; }
    .lock-badge-inline:hover svg { color:var(--accent); }
    .lock-badge-inline .lock-tooltip { right:auto; left:50%; transform:translateX(-50%) translateY(4px); }
    .lock-badge-inline:hover .lock-tooltip { transform:translateX(-50%) translateY(0); opacity:1; }
    .pcard-location-overlay { position:absolute; bottom:10px; left:12px; font-size:11px; font-weight:600; letter-spacing:.6px; color:rgba(255,255,255,.75); }
    .pcard-body { padding:14px 16px 10px; }
    .pcard-stage-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .stage-pill { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
    .stage-design       { background:var(--accent-pale); color:var(--accent); }
    .stage-construction { background:#fff8e6; color:#9a6c00; }
    .stage-operation    { background:#e6f4ff; color:#1a5fa0; }
    .pcard-interests { font-size:12px; font-weight:600; color:var(--accent); display:flex; align-items:center; gap:4px; }
    .pcard-interests.none { color:var(--text4); }
    .pcard-name { font-size:15px; font-weight:700; color:var(--text1); margin-bottom:4px; line-height:1.3; }
    /* STARS BELOW IMAGE */
    .pcard-stars-overlay { display:flex; align-items:center; gap:6px; padding:8px 14px; background:var(--surface2); border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
    .pcard-stars-overlay:hover { background:var(--accent-pale); }
    .pcard-stars-overlay:hover .rs { transform:scale(1.12); }
    .pcard-stars-overlay .rs { color:#f5a623; font-size:17px; line-height:1; transition:transform .15s; }
    .pcard-stars-overlay .rs-empty { color:var(--border); }
    .pcard-stars-overlay .rs-label { font-size:12px; font-weight:700; color:var(--text2); margin-left:4px; }
    .readiness-stars { display:flex; align-items:center; gap:2px; margin-bottom:6px; }
    .rs { font-size:20px; line-height:1; transition:transform .15s; }
    .rs-full  { color:#F59E0B; }
    .rs-half  { color:#F59E0B; opacity:.55; }
    .rs-empty { color:rgba(255,255,255,.3); }
    .rs-label { font-size:11px; font-weight:700; color:#fff; margin-left:4px; text-shadow:0 1px 3px rgba(0,0,0,.5); }
    /* RATINGS DIALOG */
    .rating-dialog-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .18s ease; }
    .rating-dialog { background:var(--surface); border-radius:16px; max-width:480px; width:100%; box-shadow:0 24px 64px rgba(0,0,0,.3); overflow:hidden; animation:slideUp .2s ease; }
    .rating-dialog-header { background:linear-gradient(135deg,#0a2e1e 0%,#0d3a25 100%); padding:20px 24px 16px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .rating-dialog-title { font-size:17px; font-weight:700; color:#fff; }
    .rating-dialog-sub { font-size:12px; color:rgba(255,255,255,.65); margin-top:3px; }
    .rating-dialog-close { background:rgba(255,255,255,.12); border:none; color:#fff; width:30px; height:30px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .15s; }
    .rating-dialog-close:hover { background:rgba(255,255,255,.22); }
    .rating-dialog-score { display:flex; align-items:center; gap:12px; padding:16px 24px; border-bottom:1px solid var(--border); background:var(--bg); }
    .rating-dialog-stars { display:flex; gap:4px; }
    .rating-dialog-stars span { font-size:26px; }
    .rating-dialog-score-val { font-size:28px; font-weight:800; color:var(--text1); }
    .rating-dialog-score-sub { font-size:12px; color:var(--text3); }
    .rating-dialog-body { padding:16px 24px 20px; }
    .rating-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
    .rating-row:last-child { border-bottom:none; }
    .rating-row-label { font-size:13px; font-weight:500; color:var(--text1); flex:1; }
    .rating-row-badge { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; white-space:nowrap; }
    .rbadge-ready   { background:#D1FAE5; color:#065F46; }
    .rbadge-partial { background:#FEF3C7; color:#92400E; }
    .rbadge-not     { background:#F3F4F6; color:#6B7280; }
    .rbadge-na      { background:#F3F4F6; color:#9CA3AF; }
    .rating-legend  { display:flex; gap:12px; flex-wrap:wrap; margin:14px 0 4px; }
    .rating-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text3); }
    .rating-legend-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes spin    { to { transform:rotate(360deg); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .pcard-loc  { font-size:12px; color:var(--text3); display:flex; align-items:center; gap:5px; margin-bottom:12px; }
    .loc-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }
    .pcard-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
    .pm { background:var(--bg); border-radius:var(--radius); padding:7px 9px; }
    .pm-val   { font-size:12px; font-weight:700; color:var(--text1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pm-label { font-size:10px; color:var(--text4); margin-top:1px; letter-spacing:.2px; }
    .pcard-features { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
    .pfeat { padding:2px 8px; border-radius:20px; font-size:11px; font-weight:500; background:var(--accent-pale); color:var(--accent); border:1px solid var(--accent-border); }
    .pcard-footer { border-top:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .pf-funding-label { font-size:11px; color:var(--text3); }
    .pf-funding-val   { font-size:15px; font-weight:700; color:var(--accent); }
    .pf-funding-type  { font-size:11px; color:var(--text3); margin-top:1px; }
    .pf-actions { display:flex; gap:6px; flex-shrink:0; }

    /* TAGS & INFO */
    .tag { display:inline-flex; align-items:center; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; }
    .tag-grey  { background:#F3F4F6; color:var(--text3); }
    .tag-green { background:var(--accent-pale); color:var(--accent); border:1px solid var(--accent-border); }
    .tag-blue  { background:var(--blue-pale); color:var(--blue); }
    .tag-amber { background:var(--amber-pale); color:var(--amber); }
    .tag-red   { background:var(--red-pale); color:var(--red); }
    .info-box { border-radius:var(--radius); padding:10px 14px; font-size:12px; line-height:1.6; }
    .info-box.green  { background:var(--accent-pale); border:1px solid var(--accent-border); color:var(--accent-dark); }
    .info-box.amber  { background:var(--amber-pale); border:1px solid #FDE68A; color:#92400E; }
    .info-box.blue   { background:var(--blue-pale); border:1px solid #BFDBFE; color:#1E40AF; }
    .info-box.purple { background:var(--purple-pale); border:1px solid #DDD6FE; color:#5B21B6; }

    /* CERTIFICATION */
    .cert-tabs { display:flex; gap:4px; margin-bottom:20px; flex-wrap:wrap; }
    .cert-tab { padding:6px 14px; border-radius:var(--radius); font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border); color:var(--text3); background:var(--bg); transition:all .15s; }
    .cert-tab.active { background:var(--accent); color:#0a2e1e; border-color:var(--accent); }
    .cert-tab:hover:not(.active) { background:var(--accent-pale); color:var(--accent); border-color:var(--accent-border); }
    .progress-track { display:flex; flex-direction:column; gap:0; margin-bottom:24px; }
    .prog-step { display:flex; align-items:flex-start; gap:14px; position:relative; }
    .prog-step:not(:last-child) .prog-dot::after { content:''; position:absolute; top:26px; left:12px; width:2px; height:calc(100% + 0px); background:var(--border); z-index:0; }
    .prog-step.done .prog-dot::after  { background:var(--accent); }
    .prog-step.active .prog-dot::after { background:var(--border); }
    .prog-dot { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; z-index:1; position:relative; flex-shrink:0; }
    .prog-dot.done   { background:var(--accent); color:#0a2e1e; }
    .prog-dot.active { background:var(--blue); color:#fff; box-shadow:0 0 0 4px var(--blue-pale); }
    .prog-dot.pending{ background:var(--border); color:var(--text4); }
    .prog-info { display:flex; flex-direction:column; padding-bottom:24px; }
    .prog-label  { font-size:13px; font-weight:600; color:var(--text1); line-height:1.4; }
    .prog-status { font-size:11px; margin-top:2px; }
    .prog-status.done   { color:var(--accent); }
    .prog-status.active { color:var(--blue); }
    .prog-status.pending{ color:var(--text4); }
    .cert-footer { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--border); padding-top:12px; font-size:12px; color:var(--text3); }

    /* PIPELINE */
    /* ── Kanban Pipeline ── */
    .kanban { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; align-items:start; padding-bottom:8px; }
    .kcol { display:flex; flex-direction:column; min-width:0; border-radius:10px; overflow:hidden; border:1px solid var(--border); background:var(--surface); }
    .kcol-header { display:flex; align-items:center; gap:5px; padding:8px 10px; }
    .kcol-num { width:18px; height:18px; border-radius:50%; color:#fff; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .kcol-label { font-size:11px; font-weight:600; color:var(--text1); flex:1; line-height:1.3; }
    .kcol-count { min-width:18px; height:18px; border-radius:9px; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 5px; }
    .kcol-body { display:flex; flex-direction:column; gap:8px; padding:10px; min-height:80px; background:var(--bg); }
    .kcol-empty { font-size:11px; color:var(--text4); text-align:center; padding:16px 0; font-style:italic; }
    .kcard { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
    .kcard-urgent { border-color:#F59E0B; box-shadow:0 0 0 2px rgba(245,158,11,.15); }
    .kcard-project { font-size:12px; font-weight:700; color:#0a2e1e; background:var(--accent-pale); border-radius:5px; padding:3px 7px; margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
    .kcard-details { display:flex; flex-direction:column; gap:4px; }
    .kcard-detail-row { display:flex; flex-direction:column; gap:0px; }
    .kcard-detail-label { font-size:9px; font-weight:700; color:var(--text4); }
    .kcard-detail-val { font-size:12px; font-weight:600; color:var(--text1); word-break:break-word; }
    .kcard-action { margin-top:6px; font-size:11px; color:var(--text3); font-style:italic; }

    /* PIPELINE PROJECT DETAIL CARD */
    .pipe-proj-card { background:var(--surface); border:1.5px solid var(--accent-border); border-radius:12px; padding:16px 20px; margin-bottom:16px; display:flex; align-items:flex-start; gap:18px; }
    .pipe-proj-icon { width:44px; height:44px; border-radius:10px; background:var(--accent-pale); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#0a2e1e; }
    .pipe-proj-body { flex:1; min-width:0; }
    .pipe-proj-name { font-size:16px; font-weight:700; color:var(--text1); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pipe-proj-meta { display:flex; flex-wrap:wrap; gap:10px 20px; margin-top:8px; }
    .pipe-proj-stat { display:flex; flex-direction:column; gap:1px; }
    .pipe-proj-stat-label { font-size:10px; font-weight:600; color:var(--text4); }
    .pipe-proj-stat-val   { font-size:13px; font-weight:600; color:var(--text1); }
    .pipe-proj-badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
    /* PIPELINE PROJECT SELECTOR */
    .pipe-selector-wrap { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .pipe-selector-label { font-size:12px; font-weight:600; color:var(--text3); white-space:nowrap; }
    .pipe-selector { position:relative; flex:0 0 320px; }
    .pipe-selector select { width:100%; appearance:none; -webkit-appearance:none; background:var(--surface); border:1.5px solid var(--accent-border); border-radius:10px; padding:10px 40px 10px 14px; font-size:14px; font-weight:600; color:var(--text1); cursor:pointer; outline:none; transition:border-color .2s, box-shadow .2s; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .pipe-selector select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
    .pipe-selector-arrow { position:absolute; right:12px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--accent); }
    .pipe-selector-chip { display:inline-flex; align-items:center; gap:6px; background:var(--accent-pale); border:1.5px solid var(--accent-border); border-radius:20px; padding:5px 12px; font-size:12px; font-weight:700; color:#0a2e1e; white-space:nowrap; }
    .pipe-selector-chip svg { flex-shrink:0; }

    /* NOTIFICATIONS */
    .notif-row { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
    .notif-row:last-child { border-bottom:none; }
    .notif-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; }
    .notif-dot.unread { background:var(--blue); }
    .notif-dot.read   { background:var(--border); }
    .notif-body { flex:1; min-width:0; }
    .notif-title { font-size:13px; font-weight:600; color:var(--text1); }
    .notif-title.dimmed { color:var(--text4); font-weight:400; }
    .notif-sub  { font-size:12px; color:var(--text3); margin-top:2px; }
    .notif-time { font-size:11px; color:var(--text4); margin-top:2px; }

    /* SETTINGS */
    .stg-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card); margin-bottom:16px; overflow:hidden; }
    .stg-section-hdr { display:flex; align-items:center; gap:8px; padding:13px 20px; border-bottom:1px solid var(--border); background:var(--bg); }
    .stg-section-hdr svg { color:var(--accent); flex-shrink:0; }
    .stg-section-title { font-size:12px; font-weight:700; color:var(--text1); letter-spacing:.02em; }
    .stg-row { display:flex; align-items:center; gap:16px; padding:15px 20px; border-bottom:1px solid var(--border); }
    .stg-row:last-child { border-bottom:none; }
    .stg-row-info { flex:1; min-width:0; }
    .stg-row-label { font-size:13px; font-weight:600; color:var(--text1); }
    .stg-row-desc  { font-size:11px; color:var(--text3); margin-top:3px; line-height:1.4; }
    .stg-toggle { width:42px; height:24px; border-radius:12px; background:#D1D5DB; cursor:pointer; position:relative; flex-shrink:0; transition:background .2s; }
    .stg-toggle.on { background:var(--accent); }
    .stg-knob { width:20px; height:20px; border-radius:50%; background:#fff; position:absolute; top:2px; left:2px; transition:left .2s; box-shadow:0 1px 4px rgba(0,0,0,.2); }
    .stg-toggle.on .stg-knob { left:20px; }
    .stg-select { border:1px solid var(--border2); border-radius:8px; padding:7px 12px; font-size:12.5px; color:var(--text1); background:var(--surface); cursor:pointer; min-width:220px; font-family:'DM Sans',sans-serif; }
    .stg-select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
    .stg-save-row { display:flex; justify-content:center; padding:16px 20px; border-top:1px solid var(--border); background:var(--bg); }

    /* QUICK ACTIONS */
    .qa-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .qa-tile { border:1px solid var(--border); border-radius:var(--radius-card); padding:20px; text-align:center; cursor:pointer; transition:all .15s; background:var(--surface); text-decoration:none; display:block; }
    .qa-tile:hover { border-color:var(--accent); box-shadow:var(--shadow-md); background:var(--accent-pale); }
    .qa-icon { width:44px; height:44px; border-radius:10px; background:var(--accent-pale); border:1px solid var(--accent-border); display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
    .qa-icon svg { width:22px; height:22px; stroke:var(--accent); }
    .qa-title { font-size:13px; font-weight:600; color:var(--text1); }
    .qa-sub   { font-size:12px; color:var(--text3); margin-top:4px; }

    /* ONBOARDING */
    .ob-summary-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
    .ob-summary-tile { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card); padding:14px 16px; }
    .ob-summary-label { font-size:11px; color:var(--text3); font-weight:500; margin-bottom:4px; }
    .ob-summary-val   { font-size:20px; font-weight:700; }
    .ob-summary-val.green  { color:var(--accent); }
    .ob-summary-val.blue   { color:var(--blue); }
    .ob-summary-val.amber  { color:var(--amber); font-size:15px; padding-top:3px; }
    .ob-progress-bar  { height:6px; border-radius:3px; background:var(--border); margin-top:6px; overflow:hidden; }
    .ob-progress-fill { height:100%; border-radius:3px; background:var(--accent); transition:width .4s; }
    .ob-steps { display:flex; flex-direction:column; }
    .ob-step  { display:flex; align-items:flex-start; gap:16px; padding:18px 0; border-bottom:1px solid var(--border); position:relative; }
    .ob-step:last-child { border-bottom:none; }
    .ob-step-line { position:absolute; left:19px; top:58px; bottom:0; width:2px; background:var(--border); }
    .ob-step.done   .ob-step-line { background:var(--accent); }
    .ob-step:last-child .ob-step-line { display:none; }
    .ob-dot { width:40px; height:40px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; z-index:1; }
    .ob-dot.done    { background:var(--accent); color:#0a2e1e; }
    .ob-dot.active  { background:var(--blue); color:#fff; box-shadow:0 0 0 5px var(--blue-pale); }
    .ob-dot.pending { background:var(--border); color:var(--text4); }
    .ob-content { flex:1; min-width:0; padding-top:6px; }
    .ob-step-title { font-size:14px; font-weight:600; color:var(--text1); }
    .ob-step.pending .ob-step-title { color:var(--text3); }
    .ob-step-desc  { font-size:12px; color:var(--text3); margin-top:3px; line-height:1.6; }
    .ob-badge { display:inline-flex; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
    .ob-badge.done    { background:var(--accent-pale); color:var(--accent); border:1px solid var(--accent-border); }
    .ob-badge.active  { background:var(--blue-pale); color:var(--blue); border:1px solid #BFDBFE; }
    .ob-badge.pending { background:#F3F4F6; color:var(--text4); }
    .ob-checklist { margin-top:10px; display:flex; flex-direction:column; gap:4px; }
    .ob-check-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); }
    .ob-check-item.checked   .ck-icon { color:var(--accent); }
    .ob-check-item.unchecked .ck-icon { color:var(--text4); }
    .ck-icon { width:16px; height:16px; flex-shrink:0; }
    .ob-step-meta { font-size:11px; color:var(--text3); margin-top:8px; }

    /* PLACEHOLDER */
    .placeholder-stub { text-align:center; padding:60px 20px; color:var(--text4); }
    .placeholder-stub svg { width:48px; height:48px; stroke:var(--border); margin-bottom:14px; }
    .placeholder-stub p { font-size:13px; margin-top:6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* PROJECT DETAIL PAGE */
    .pd-hero { position:relative; border-radius:var(--radius-card); overflow:hidden; height:240px; margin-bottom:0; }
    .pd-hero-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.15) 60%,transparent 100%); }
    .pd-hero-content { position:absolute; bottom:0; left:0; right:0; padding:22px 24px; }
    .pd-hero-name    { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; color:#fff; line-height:1.25; margin-bottom:4px; }
    .pd-hero-entity  { font-size:12px; color:rgba(255,255,255,.75); margin-bottom:6px; }
    .pd-hero-loc     { display:flex; align-items:center; gap:5px; font-size:12px; color:rgba(255,255,255,.75); }
    .pd-stats        { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:14px 0; }
    .pd-stat         { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card); padding:12px 14px; text-align:center; }
    .pd-stat-val     { font-size:13px; font-weight:700; color:var(--accent); line-height:1.3; word-break:break-word; }
    .pd-stat-lbl     { font-size:10px; color:var(--text3); margin-top:4px; line-height:1.3; }
    .pd-sec-hdr      { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--border); background:var(--surface); }
    .pd-sec-title    { font-size:14px; font-weight:600; color:var(--text1); }
    .pd-body         { padding:16px 20px; display:flex; flex-direction:column; gap:0; }
    .pd-desc         { font-size:13.5px; color:var(--text2); line-height:1.65; margin-bottom:18px; }
    .pd-g2           { display:grid; grid-template-columns:1fr 1fr; gap:0 24px; }
    .pd-row          { display:flex; flex-direction:column; gap:2px; padding:10px 0; border-bottom:1px solid var(--border); }
    .pd-g2 .pd-row   { border-bottom:none; padding:8px 0; }
    .pd-row:last-child { border-bottom:none; }
    .pd-label        { font-size:11px; font-weight:600; color:var(--text3); }
    .pd-value        { font-size:13.5px; font-weight:500; color:var(--text1); }
    .pd-doc-link     { display:inline-flex; align-items:center; gap:5px; font-size:12.5px; color:var(--blue); text-decoration:none; padding:3px 0; }
    .pd-doc-link:hover { text-decoration:underline; }
    .pd-doc-chip     { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:var(--text1); background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:5px 10px; text-decoration:none; transition:border-color .15s,background .15s; }
    .pd-doc-chip:hover { border-color:var(--accent); background:var(--accent-pale); color:#0a2e1e; }
    /* DATA ROOM */
    .dr-section        { margin-bottom:24px; }
    .dr-section-head   { display:flex; align-items:center; gap:10px; padding:0 0 10px; border-bottom:1.5px solid var(--border); margin-bottom:14px; }
    .dr-section-icon   { width:32px; height:32px; border-radius:8px; background:var(--accent-pale); display:flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0; }
    .dr-section-icon svg { width:16px; height:16px; }
    .dr-section-title  { font-size:14px; font-weight:700; color:var(--text1); }
    .dr-section-count  { font-size:12px; color:var(--text3); background:var(--surface2); border-radius:10px; padding:2px 8px; margin-left:auto; }
    .dr-files-grid     { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
    .dr-file-card      { display:flex; flex-direction:column; border-radius:10px; border:1px solid var(--border); overflow:hidden; background:var(--bg); transition:border-color .15s,box-shadow .15s; }
    .dr-file-card:hover{ border-color:var(--accent); box-shadow:0 2px 10px rgba(16,100,56,.1); }
    .dr-file-img       { width:100%; height:130px; object-fit:cover; background:#1a5438; display:block; }
    .dr-file-img-ph    { width:100%; height:130px; background:linear-gradient(135deg,#0d2a1e,#1a5438); display:flex; align-items:center; justify-content:center; }
    .dr-file-img-ph svg{ width:36px; height:36px; opacity:.35; color:#fff; }
    .dr-file-info      { padding:10px 12px; flex:1; display:flex; flex-direction:column; gap:4px; }
    .dr-file-name      { font-size:12px; font-weight:600; color:var(--text1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dr-file-label     { font-size:11px; color:var(--text3); }
    .dr-file-actions   { padding:0 12px 10px; }
    .dr-file-btn       { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--accent); text-decoration:none; background:var(--accent-pale); border:1px solid var(--accent-border); border-radius:6px; padding:4px 10px; transition:background .15s,color .15s; cursor:pointer; font-family:inherit; line-height:1.4; white-space:nowrap; }
    .dr-file-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .dr-empty          { font-size:13px; color:var(--text3); font-style:italic; padding:8px 0; }
    .dr-img-grid       { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; }
    .dr-img-thumb      { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:8px; border:1px solid var(--border); cursor:pointer; transition:transform .2s,border-color .15s; display:block; background:#1a5438; }
    .dr-img-thumb:hover{ transform:scale(1.03); border-color:var(--accent); }
    /* GALLERY SLIDER */
    .gslider          { position:relative; border-radius:var(--radius-card); overflow:hidden; background:#0d2a1e; }
    .gslider-track    { display:flex; transition:transform .35s cubic-bezier(.4,0,.2,1); will-change:transform; }
    .gslider-slide    { flex:0 0 100%; height:280px; background:#0d2a1e center/cover no-repeat; cursor:pointer; position:relative; }
    .gslider-slide-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    .gslider-btn      { position:absolute; top:50%; transform:translateY(-50%); z-index:10; background:rgba(0,0,0,.45); border:none; color:#fff; width:36px; height:36px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; line-height:1; }
    .gslider-btn:hover{ background:rgba(0,0,0,.72); }
    .gslider-prev     { left:10px; }
    .gslider-next     { right:10px; }
    .gslider-dots     { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
    .gslider-dot      { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.45); cursor:pointer; transition:background .2s; }
    .gslider-dot.active { background:#fff; }
    .gslider-count    { position:absolute; top:10px; right:12px; background:rgba(0,0,0,.5); color:#fff; font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px; }
    @media(max-width:680px){
      .pd-stats { grid-template-columns:repeat(2,1fr); }
      .pd-g2    { grid-template-columns:1fr; gap:0; }
    }

    /* PROFILE */
    .profile-hero { display:flex; align-items:center; gap:20px; padding:4px 0 16px; border-bottom:1px solid var(--border); margin-bottom:20px; flex-wrap:wrap; }
    .profile-avatar-lg { width:72px; height:72px; border-radius:50%; background:var(--accent); color:#0a2e1e; font-size:26px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .profile-hero-info h2 { font-size:20px; font-weight:700; color:var(--text1); }
    .profile-hero-info p  { font-size:13px; color:var(--text3); margin-top:3px; }
    .profile-hero-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
    .profile-section { margin-bottom:24px; }
    .profile-section-title { font-size:11px; font-weight:700; color:var(--text4); text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--border); }
    .profile-fields { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .profile-fields.cols3 { grid-template-columns:repeat(3,1fr); }
    .profile-fields.cols1 { grid-template-columns:1fr; }

    /* PROFILE EDIT FORM */
    .pf-edit-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:18px; }
    .pf-edit-grid.cols1 { grid-template-columns:1fr; }
    .pf-edit-grid.cols3 { grid-template-columns:repeat(3,1fr); }
    .pf-field { display:flex; flex-direction:column; gap:4px; }
    .pf-field label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; }
    .pf-field input, .pf-field select, .pf-field textarea {
      padding:8px 10px; border:1.5px solid var(--border); border-radius:var(--radius);
      font-size:13px; font-family:inherit; color:var(--text1); background:var(--surface);
      outline:none; transition:border .15s;
    }
    .pf-field input:focus, .pf-field select:focus, .pf-field textarea:focus { border-color:var(--accent); }
    .pf-field input[readonly], .pf-field input:disabled { background:var(--bg); color:var(--text3); cursor:not-allowed; }
    .pf-field textarea { resize:vertical; min-height:70px; }
    .pf-section-label { font-size:11px; font-weight:700; color:var(--text4); text-transform:uppercase; letter-spacing:.08em; padding-bottom:6px; border-bottom:1px solid var(--border); margin-bottom:14px; margin-top:20px; grid-column:1/-1; }
    .pf-checkbox-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding:4px 0; }
    .pf-checkbox-row label { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:500; color:var(--text2); cursor:pointer; }
    .profile-save-row { display:flex; gap:10px; align-items:center; padding-top:16px; border-top:1px solid var(--border); margin-top:4px; }

    .g3   { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }

    .f    { display:flex; flex-direction:column; gap:5px; }
    .fl   { font-size:11px; font-weight:600; color:var(--text2); letter-spacing:.02em; display:flex; align-items:center; gap:4px; }
    .req  { color:var(--accent); font-size:14px; line-height:1; }
    .opt  { color:var(--text4); font-size:10px; font-weight:400; letter-spacing:0; }
    .fn   { font-size:11px; color:var(--text4); margin-top:1px; }
    .prefilled-badge { font-size:10px; font-weight:500; color:var(--accent); background:rgba(22,163,74,.1); border:1px solid rgba(22,163,74,.25); border-radius:4px; padding:1px 6px; white-space:nowrap; }

      padding:9px 12px; outline:none; width:100%; transition:border-color .18s, box-shadow .18s;
    }
    .f input:focus, .f select:focus, .f textarea:focus {
      border-color:var(--accent); box-shadow:0 0 0 3px rgba(22,163,74,.15);
    }
    .f input::placeholder, .f textarea::placeholder { color:var(--text4); font-size:13px; }
    .f textarea { resize:vertical; min-height:82px; }
    .f input[readonly], .f input.prefilled-input {
      background:rgba(22,163,74,.05); border-color:rgba(22,163,74,.3);
      color:var(--text2); cursor:not-allowed;
    }
    .prow     { display:flex; align-items:stretch; }
    .prow input { flex:1; }
    .prow.has-prefix input { border-radius:0 var(--radius) var(--radius) 0 !important; }
    .prow.has-suffix input { border-radius:var(--radius) 0 0 var(--radius) !important; }
    .pfx { background:var(--bg); border:1.5px solid var(--border); padding:9px 11px; font-size:13px; color:var(--text2); white-space:nowrap; display:flex; align-items:center; font-weight:500; }

    .ch   { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text2); cursor:pointer; padding:5px 8px; border-radius:7px; transition:background .12s; line-height:1.4; }

      display: grid;

      gap: 10px;

    .doc-card {
      background: var(--bg);

    .cur-badge svg   { flex-shrink:0; }

    .ccm-confirm-btns  { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
  </style>
</head>

/* Returns array of selected service strings from requirements record */
function selectedServices() {
  var raw = (OnboardingState.requirements || {}).Services_Needed_from_CCM;
  if (!raw) return [];
  var list = [];
  if (Array.isArray(raw))                list = raw;
  else if (typeof raw === 'string')      list = raw.split(/[;,]/).map(function(s){ return s.trim(); }).filter(Boolean);
  else if (raw && raw.display_value)     list = raw.display_value.split(/[;,]/).map(function(s){ return s.trim(); }).filter(Boolean);
  else if (raw && raw.value)             list = String(raw.value).split(/[;,]/).map(function(s){ return s.trim(); }).filter(Boolean);
  return list;
}

/* Case-insensitive partial match: sidebar showIfService vs selected services */
function serviceSelected(needle, haystack) {
  var n = needle.toLowerCase().replace(/[^a-z0-9]/g, '');
  return haystack.some(function(s) {
    var h = s.toLowerCase().replace(/[^a-z0-9]/g, '');
    return h.includes(n) || n.includes(h);
  });
}

function renderSidebar(resetProfile) {
  // Only reset profile placeholders on first call (page load), not on re-renders
  if (resetProfile) {
    document.getElementById('navAvatar').textContent      = '…';
    document.getElementById('navName').textContent        = 'Loading…';
    document.getElementById('navMeta').textContent        = '';
    document.getElementById('sidebarAvatar').textContent  = '…';
    document.getElementById('sidebarName').textContent    = 'Loading…';
    document.getElementById('sidebarMeta').textContent    = '';
  }

  var services = selectedServices();
  var html = '';
  var prevWasSection = false;

  SIDEBAR_ITEMS.forEach(function(item) {
    if (item.section) {
      // Buffer section header — only emit if at least one following tab is visible
      prevWasSection = item.section;
    } else {
      // Skip items gated on a service the promotor hasn't selected
      if (item.showIfService && !serviceSelected(item.showIfService, services)) return;

      // Emit buffered section header now that we have a visible item under it
      if (prevWasSection) {
        html += '<div class="sidebar-section">' + prevWasSection + '</div>';
        prevWasSection = false;
      }

      var badgeHtml = '';
      if (item.badge) {
        badgeHtml = '<span id="sidebar-notif-badge" style="margin-left:auto;background:var(--blue);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:700;display:none">0</span>';
      }
      html += '<a href="#" onclick="showTab(\'' + item.id + '\');return false;" data-tab="' + item.id + '">' +
                svgIcon(item.icon) + item.label + badgeHtml +
              '</a>';
    }
  });
  document.getElementById('sidebarNav').innerHTML = html;
  updateSidebarActive();
}

function updateSidebarActive() {
  document.querySelectorAll('.sidebar-nav a[data-tab]').forEach(function(a) {
    a.classList.toggle('active', a.getAttribute('data-tab') === State.activeTab);
  });
}

/* Re-render dashboard if it is currently the active tab */
function refreshDashboard() {
  if (State.activeTab === 'dashboard') {
    document.getElementById('mainContent').innerHTML = renderDashboard();

}

function renderOnboarding() {
  var rec  = ProfileState.record || {};
  var proj = ProjectState.projects;
  var ob   = OnboardingState;

  /* ── Step detection from real Zoho records ── */
  var hasNecessary    = !!(ob.necessary);                                          // record exists in All_Necessary_Information
  var hasRegistration = !!(ProfileState.record);          // registration record fetched
  var hasRequirements = !!(ob.requirements);                                       // record exists in requirements_signoff_Report
  var hasProjects     = Array.isArray(proj) && proj.length > 0;

  // Also check req from projects as fallback
  if (!hasRequirements && Array.isArray(proj)) {
    hasRequirements = proj.some(function(p){ return p._req; });
  }

  var stepsCompleted  = [hasNecessary, hasRegistration, hasRequirements].filter(Boolean).length;
  var totalSteps      = 5;
  var pct             = Math.round((stepsCompleted / totalSteps) * 100);

  var currentStatus   = !hasRegistration  ? 'Incomplete'
    : !hasNecessary                        ? 'Step 1 Pending'
    : !hasRequirements                     ? 'Step 3 Pending'
    : stepsCompleted >= 3                  ? 'Expert Review'
    : 'Submitted';

  // Actual submission dates from records
  function recDate(r, field) {
    if (!r) return null;
    var v = r[field] || r['Added_Time'] || r['Modified_Time'] || '';
    return v ? fmtDate(v) : null;
  }

  /* ── Helper: format capital value using selected currency ── */
  function fmtUSD(v) { return fmtCapital(v); }
  function zstr(v) {
    if (!v) return null;
    if (Array.isArray(v)) return v.filter(Boolean).join(', ') || null;
    if (typeof v === 'object') return v.display_value || v.value || null;
    return String(v) || null;
  }

  /* ── Step definitions ── */
  var STEPS = [
    {
      num: 1, title: 'Necessary Information',
      desc: 'Basic project readiness, capital requirements, and initial assessment details.',
      state: hasNecessary ? 'done' : 'active',
      checks: [
        { done: !!(ob.necessary && ob.necessary.Finance_type),
          text: 'Finance type' + (zstr(ob.necessary && ob.necessary.Finance_type) ? ': <strong>' + esc(zstr(ob.necessary.Finance_type)) + '</strong>' : ' — not selected') },
        { done: !!(ob.necessary && ob.necessary.DPR_Feasibility_Study),
          text: 'DPR / Feasibility Study' + (zstr(ob.necessary && ob.necessary.DPR_Feasibility_Study) ? ': <strong>' + esc(zstr(ob.necessary.DPR_Feasibility_Study)) + '</strong>' : ' — not filled') },
        { done: !!(ob.necessary && ob.necessary.upload_corporate_presentation),

      ],

/* ── Project Readiness Star Rating ─────────────────────────────
   9 components × Ready(2) / Partial(1) / Not Ready(0) → max 18 → 5 stars */
function calcReadinessStars() {
  var nec = (typeof OnboardingState !== 'undefined') ? OnboardingState.necessary : null;
  if (!nec) return null;
  var keys = ['DPR_Feasibility_Study','Land_Site','Permits_Approvals',
              'Technoloy_Equipment','EPC_Construction_Team','Equity_Committed',
              'Green_Certification','Impact_Assessment','Market_Demand'];
  var score = 0, filled = 0;
  keys.forEach(function(k) {
    var v = (nec[k] || '').toString().toLowerCase();
    if (v === 'ready')    { score += 2; filled++; }
    else if (v === 'partial') { score += 1; filled++; }
    else if (v === 'not ready' || v === 'notready') { filled++; }
  });
  if (filled === 0) return null;
  return (score / 18) * 5;
}

function renderReadinessStars(stars) {
  if (stars === null) return '';
  var starsHtml = '';
  for (var i = 1; i <= 5; i++) {
    if (stars >= i)            starsHtml += '<span class="rs rs-full">&#9733;</span>';
    else if (stars >= i - 0.5) starsHtml += '<span class="rs rs-half">&#9733;</span>';
    else                       starsHtml += '<span class="rs rs-empty">&#9733;</span>';
  }
  return '<div class="pcard-stars-overlay" onclick="event.stopPropagation();openRatingDialog()">' +
    starsHtml +
    '<span class="rs-label">' + stars.toFixed(1) + ' / 5</span>' +
  '</div>';
}

function viewProject(id) {
  var p = (ProjectState.projects || []).find(function(x){ return x.id == id; });
  if (!p) return;
  State.activeTab = 'projects';
  updateSidebarActive();
  document.getElementById('mainContent').innerHTML = renderProjectDetail(p);
  window.scrollTo(0, 0);

    loadDetailCoverImage(p);

/* Fetch ALL requirements records once, map to projects, re-render cards */
function prefetchAllRequirements(projects) {
  if (!projects || !projects.length) return;
  if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.DATA) return;
  ZOHO.CREATOR.DATA.getRecords({
    app_name:    ZOHO_CFG.appName,
    report_name: ZOHO_CFG.reports.requirements,
    page: 1, per_page: 200
  }).then(function(res) {
    if (!res || res.code !== 3000 || !Array.isArray(res.data)) return;
    var reqs = res.data;
    var changed = false;
    projects.forEach(function(p) {
      if (p._req) return;
      var match = reqs.filter(function(r) {
        var pf = r['Project'];
        var pid = (pf && typeof pf === 'object') ? (pf.ID || pf.id) : (r['Project.ID'] || pf || r['project']);
        if (Array.isArray(pid)) pid = pid[0];
        return String(pid) === String(p.id);
      });
      if (match.length) {
        p._req = match[0];
        var r = p._req;
        var cost   = r.Total_Capital_Required || r.Total_Project_Cost;
        var equity = r.Equity_Required;
        if (cost   && Number(cost)   !== 0) p.projectCost = fmtCapital(cost)   || p.projectCost;
        if (equity && Number(equity) !== 0) p.fundingVal  = fmtCapital(equity) || p.fundingVal;
        if (r.Expected_Timeline) p.timeline = shortTimeline(r.Expected_Timeline);
        if (r.Capital_Type) p.fundingType = Array.isArray(r.Capital_Type) ? r.Capital_Type.join(' + ') : zvp(r.Capital_Type);
        changed = true;
      }
    });
    if (changed && State.activeTab === 'projects') {
      rerenderTab('projects');
      setTimeout(loadProjectImages, 0);
    }
  }).catch(function(){});
}

/* Fetch requirements_signoff record linked to this project */
function fetchProjectRequirements(p) {
  if (typeof ZOHO === 'undefined' || !ZOHO.CREATOR || !ZOHO.CREATOR.DATA) return;

  function applyResult(records) {
    var match = records.filter(function(r) {
      var pf = r['Project'];
      var pid = (pf && typeof pf === 'object') ? (pf.ID || pf.id) : (r['Project.ID'] || pf || r['project']);
      if (Array.isArray(pid)) pid = pid[0];
      return String(pid) === String(p.id);
    });
    if (!match.length && records.length === 1) match = records;
    if (match.length) { p._req = match[0]; patchRequirementsStats(p); }
  }

  // Try criteria first, fall back to no-criteria fetch
  ZOHO.CREATOR.DATA.getRecords({
    app_name:    ZOHO_CFG.appName,
    report_name: ZOHO_CFG.reports.requirements,
    criteria:    'Project == ' + p.id,
    page: 1, per_page: 200
  }).then(function(res) {
    if (res && res.code === 3000 && Array.isArray(res.data) && res.data.length) {
      applyResult(res.data);
    } else {
      // Fallback: fetch all and filter
      ZOHO.CREATOR.DATA.getRecords({
        app_name:    ZOHO_CFG.appName,
        report_name: ZOHO_CFG.reports.requirements,
        page: 1, per_page: 200
      }).then(function(r2) {
        if (r2 && r2.code === 3000 && Array.isArray(r2.data)) applyResult(r2.data);
      }).catch(function(){});
    }
  }).catch(function() {
    ZOHO.CREATOR.DATA.getRecords({
      app_name:    ZOHO_CFG.appName,
      report_name: ZOHO_CFG.reports.requirements,
      page: 1, per_page: 200
    }).then(function(r2) {
      if (r2 && r2.code === 3000 && Array.isArray(r2.data)) applyResult(r2.data);
    }).catch(function(){});
  });
}

/* After requirements load, patch the stat tiles on the detail page */
function patchRequirementsStats(p) {
  var r = p._req || {};
  var cost   = r.Total_Capital_Required || r.Total_Project_Cost;
  var equity = r.Equity_Required;
  var debt   = r.Debt_Required;
  cost   = cost   && Number(cost)   !== 0 ? fmtCapital(cost)   : null;
  equity = equity && Number(equity) !== 0 ? fmtCapital(equity) : null;
  debt   = debt   && Number(debt)   !== 0 ? fmtCapital(debt)   : null;
  var timeline = shortTimeline(r.Expected_Timeline) || null;
  var capType = Array.isArray(r.Capital_Type) ? r.Capital_Type.join(' + ') : zvp(r.Capital_Type);

  var lbl = capitalLabel();
  var el;
  if (cost && (el = document.getElementById('pds-cost-' + p.id))) el.textContent = cost;
  if (el = document.getElementById('pds-cost-lbl-' + p.id)) el.textContent = 'Total Capital (' + lbl + ')';
  if (equity && (el = document.getElementById('pds-equity-' + p.id))) el.textContent = equity;
  if (el = document.getElementById('pds-equity-lbl-' + p.id)) el.textContent = 'Equity Required (' + lbl + ')';
  if (debt && (el = document.getElementById('pds-debt-' + p.id))) el.textContent = debt;
  if (timeline && (el = document.getElementById('pds-timeline-' + p.id))) el.textContent = timeline;
  if (capType && (el = document.getElementById('pds-captype-' + p.id))) el.textContent = capType;

  // Update card metrics too (for when user goes back to grid)
  if (cost) p.projectCost = cost;
  if (timeline) p.timeline = timeline;
  if (equity) p.fundingVal = equity;
}

function renderProjectDetail(p) {
  var r = p._raw || {};

  /* Convert ALL-CAPS Zoho values to Title Case */
  function toProper(s) {
    if (!s) return s;
    if (s === s.toUpperCase() && s.length > 2) {
      return s.toLowerCase().replace(/(?:^|\s|-)\S/g, function(c){ return c.toUpperCase(); });
    }
    return s;
  }

  /* helper — safe value from raw record */
  function rv(label, val, unit) {
    var v;
    if (val === null || val === undefined || val === false || val === '') return '';
    if (typeof val === 'number') v = String(val);
    else v = toProper(zvp(val));
    if (!v && v !== '0') return '';
    if (unit) v = v + ' ' + unit;
    return '<div class="pd-row">' +
      '<div class="pd-label">' + label + '</div>' +
      '<div class="pd-value">' + esc(v) + '</div>' +
    '</div>';
  }

  /* helper — section header */
  function sec(badge, title) {
    return '<div class="pd-sec-hdr"><div class="sbadge">' + badge + '</div>' +
      '<div class="pd-sec-title">' + title + '</div></div>';
  }

  /* helper — 2-col grid row */
  function row2(a, b) { return '<div class="pd-g2">' + (a||'') + (b||'') + '</div>'; }

  /* helper — document card (label + file chips stacked cleanly) */
  function docLink(label, field) {
    var entries = zohoFileEntries(field);
    if (!entries.length) return '';
    var isImg = entries.some(function(f){ return /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(f.name); });
    var iconPath = isImg
      ? '<path d="M21 15l-5-5L5 21"/><circle cx="9" cy="9" r="2"/><rect x="3" y="3" width="18" height="18" rx="2"/>'
      : '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>';
    return (
      '<div class="doc-card">' +
        '<div class="doc-card-label">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">' + iconPath + '</svg>' +
          esc(label) +
        '</div>' +
        '<div class="doc-card-files">' +
          entries.map(function(f) {
            return '<a class="doc-file-chip" href="' + esc(f.rawUrl || '#') + '" target="_blank" title="' + esc(f.name) + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
              '<span>' + esc(f.name) + '</span>' +
            '</a>';
          }).join('') +
        '</div>' +
      '</div>'
    );
  }

  /* addr */
  var addr     = r.Address || {};
  var addrLine = zvp(addr.address_line_1) || zvp(addr.Address_Line_1) || '';
  var city     = zvp(addr.district_city)  || zvp(addr.District_City)  || '';
  var state    = zvp(addr.state_province) || zvp(addr.State_Province) || '';
  var postal   = zvp(addr.postal_Code)    || zvp(addr.postal_code)    || '';
  var country  = zvp(addr.country)        || zvp(addr.Country)        || 'India';
  var fullAddr = [addrLine, city, state, postal, country].filter(Boolean).join(', ');

  /* certifications */
  var certList = Array.isArray(r.Present_Certification) ? r.Present_Certification
               : (r.Present_Certification ? [r.Present_Certification] : []);
  var certChips = certList.map(function(c){ return '<span class="pfeat">' + esc(zvp(c)) + '</span>'; }).join('');

  /* gallery slider — all gallery images */
  var galleryEntries = zohoFileEntries(r.Project_Gallery);
  var n = galleryEntries.length;
  var galleryHtml = n
    ? '<div class="gslider" id="gslider-' + p.id + '">' +
        '<div class="gslider-track" id="gtrack-' + p.id + '">' +
          galleryEntries.map(function(f, i){
            return '<div class="gslider-slide" id="gslide-' + p.id + '-' + i + '">' +
              '<div class="gslider-slide-ph" id="gslide-ph-' + p.id + '-' + i + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5" width="32" height="32"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
              '</div>' +
            '</div>';
          }).join('') +
        '</div>' +
        (n > 1 ? '<button class="gslider-btn gslider-prev" onclick="gSlide(\'' + p.id + '\',-1)">&#8249;</button>' +
                 '<button class="gslider-btn gslider-next" onclick="gSlide(\'' + p.id + '\',1)">&#8250;</button>' : '') +
        '<div class="gslider-dots" id="gdots-' + p.id + '">' +
          galleryEntries.map(function(_,i){ return '<div class="gslider-dot' + (i===0?' active':'') + '" onclick="gGoTo(\'' + p.id + '\',' + i + ')"></div>'; }).join('') +
        '</div>' +
        '<div class="gslider-count" id="gcount-' + p.id + '">1 / ' + n + '</div>' +
      '</div>'
    : '';

  /* hero image */
  var heroStyle = p.img
    ? 'background:url(' + p.img + ') center/cover no-repeat,#0d2a1e'
    : 'background:linear-gradient(135deg,#0d2a1e,#1a5438)';

  /* USPs */
  var uspText = zvp(r.USPs) || '';
  var uspItems = uspText ? uspText.split(',').map(function(s){ return s.trim(); }).filter(Boolean) : [];
  var uspHtml  = uspItems.length
    ? '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">' +
        uspItems.map(function(u){ return '<span class="pfeat">' + esc(u) + '</span>'; }).join('') +
      '</div>'
    : (uspText ? '<div class="pd-value">' + esc(uspText) + '</div>' : '');

  return '' +
    /* ── Back button ── */
    '<div style="margin-bottom:16px">' +
      '<button class="btn btn-ghost btn-sm" onclick="showTab(\'projects\')">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="15 18 9 12 15 6"/></svg>' +
        'Back to Projects' +
      '</button>' +
    '</div>' +

    /* ── Hero banner ── */
    '<div class="pd-hero" id="pd-hero-' + p.id + '" style="' + heroStyle + '">' +
      '<div class="pd-hero-overlay"></div>' +
      '<div class="pd-hero-content">' +
        '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:10px">' +
          '<span class="pbadge pbadge-cat">' + esc(p.category + (p.subtype ? ' · ' + p.subtype : '')) + '</span>' +
          '<span class="tag ' + p.statusClass + '">' + esc(p.status) + '</span>' +
          '<span class="stage-pill ' + p.stageClass + '">' + esc(p.stage) + '</span>' +
          (p.cert ? '<span class="pbadge pbadge-cert">' + esc(p.cert) + '</span>' : '') +
          (p.locked ? '<div class="lock-badge-inline" style="margin-left:auto"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg><div class="lock-tooltip">Disclosed on Acceptance by Promoter</div></div>' : '') +
        '</div>' +
        '<div class="pd-hero-name">' + esc(p.name) + '</div>' +
        (zvp(r.Project_Entity_SPV) ? '<div class="pd-hero-entity">' + esc(zvp(r.Project_Entity_SPV)) + '</div>' : '') +
        '<div class="pd-hero-loc">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
          esc(fullAddr || p.location) +
        '</div>' +
      '</div>' +
    '</div>' +

    /* ── Stat tiles ── */
    '<div class="pd-stats">' +
      '<div class="pd-stat"><div class="pd-stat-val">' + esc(p.area) + '</div><div class="pd-stat-lbl">Total Built-Up Area (Sq M)</div></div>' +
      '<div class="pd-stat"><div class="pd-stat-val" id="pds-cost-' + p.id + '">' + esc(p.projectCost) + '</div><div class="pd-stat-lbl" id="pds-cost-lbl-' + p.id + '">Total Capital (' + capitalLabel() + ')</div></div>' +
      '<div class="pd-stat"><div class="pd-stat-val" id="pds-timeline-' + p.id + '">' + esc(p.timeline) + '</div><div class="pd-stat-lbl">Expected Timeline</div></div>' +
      '<div class="pd-stat"><div class="pd-stat-val" id="pds-equity-' + p.id + '">' + esc(p.fundingVal) + '</div><div class="pd-stat-lbl" id="pds-equity-lbl-' + p.id + '">Equity Required (' + capitalLabel() + ')</div></div>' +
    '</div>' +

    /* ── Section A: Project Overview ── */
    '<div class="card" style="margin-top:20px">' +
      sec('A', 'Project Overview') +
      '<div class="pd-body">' +
        (zvp(r.description) || zvp(r.Project_Description)
          ? '<div class="pd-desc">' + esc(zvp(r.description) || zvp(r.Project_Description)) + '</div>' : '') +
        '<div class="pd-g2">' +
          rv('Project Name',         r.project_name) +
          rv('Project (SPV) Entity', r.Project_Entity_SPV) +
          rv('Category',             r.category) +
          rv('Subtype',              r.Subtype) +
          rv('Project Stage',              r.Project_Stage) +
          rv('Priority Level',             r.Priority_Level) +
          rv('Design Completion Date',     r.Design_Completion_Date) +
          rv('Construction Start Date',    r.Construction_Start_Date) +
          rv('Construction End Date',      r.Construction_End_Date) +
          (p.created ? '<div class="pd-row"><div class="pd-label">Submitted On</div><div class="pd-value">' + esc(p.created) + '</div></div>' : '') +
        '</div>' +
        (uspHtml ? '<div class="pd-row" style="margin-top:4px"><div class="pd-label">USPs</div><div class="pd-value">' + uspHtml + '</div></div>' : '') +
      '</div>' +
    '</div>' +

    /* ── Section B: Location & Site Details ── */
    '<div class="card">' +
      sec('B', 'Location & Site Details') +
      '<div class="pd-body">' +
        (fullAddr ? '<div class="pd-row"><div class="pd-label">Full Address</div><div class="pd-value">' + esc(fullAddr) + '</div></div>' : '') +
        '<div class="pd-g2">' +
          rv('Land Area (Sq M)',                 r.Total_Land_Area) +
          rv('Land Ownership',                   r.Land_Ownership) +
          rv('Total Super Built-Up Area (Sq M)', r.Total_Super_Built_Up_Area) +
          rv('Total Built-Up Area (Sq M)',        r.Built_up_Area_sq_ft) +
          rv('Carpet Area (Sq M)',                r.Carpet_Area) +
          rv('Parking Area (Sq M)',               r.Parking_Area) +
          rv('No. of Buildings',                  r.No_of_Buildings) +
          rv('Total No. Of Floors',               r.No_of_Floors) +
          rv('Total No. Of Units',                r.No_of_Units) +
        '</div>' +
      '</div>' +
    '</div>' +

    /* ── Section C: Certification ── */
    '<div class="card">' +
      sec('C', 'Certification Status') +
      '<div class="pd-body">' +
        '<div class="pd-g2">' +
          rv('Is Project Certified?', r.Is_Project_Certified) +
        '</div>' +
        (certChips ? '<div class="pd-row" style="margin-top:4px"><div class="pd-label">Present Certification(s)</div><div class="pd-value"><div style="display:flex;flex-wrap:wrap;gap:6px">' + certChips + '</div></div></div>' : '') +
      '</div>' +
    '</div>' +

    /* ── Section D: Gallery ── */
    (galleryHtml ? '<div class="card">' + sec('D', 'Project Gallery') + '<div class="pd-body">' + galleryHtml + '</div></div>' : '') +

    /* ── Section E: Documents ── */
    '<div class="card">' +
      sec('E', 'Uploaded Documents') +
      '<div class="pd-body">' +
        '<div class="doc-grid">' +
          docLink('Project Cover Image',              r.Project_Cover_Image) +
          docLink('KYC / KYB',                        r.KYC_KYB) +
          docLink('Feasibility Study Report',         r.Detail_Project_Feasibility_Study_Report_Upload) +
          docLink('Legal Opinion',                    r.Legal_Opinion) +
          docLink('Land Agreement',                   r.Land_Agreement) +
          docLink('Regulatory Approval',              r.Regulatory_Approval) +
          docLink('Marketing Agreement',              r.Marketing_Agreement) +
          docLink('Present Certification(s)',         r.Upload_Present_Certification_s) +
          docLink(zvp(r.Other_Document_Name_It) || 'Other Document', r.Other_Document) +
        '</div>' +
      '</div>' +
    '</div>';
}

/* ═══════════════════════════════════════════════════════════════
   RENDER: DATA ROOM TAB
   ═══════════════════════════════════════════════════════════════ */
function renderDataRoom() {
  var ob    = OnboardingState;
  var nec   = ob.necessary   || {};
  var proj  = ProjectState.projects || [];

  // Helper: build file entries for a label + zoho field value
  function drFiles(label, val) {
    return zohoFileEntries(val).map(function(f){ return { label: label, entry: f }; });
  }

  // Helper: detect image by extension
  function isImage(url) {
    return /\.(png|jpe?g|gif|webp|svg|bmp)(\?|$)/i.test(url || '');
  }

  // ── Gather sections ─────────────────────────────────────────────────
  var sections = [];

  // 1. Promoter & Project Profiles
  var profileFiles = [].concat(
    drFiles('Corporate Presentation',  nec.upload_corporate_presentation),
    drFiles('Project (SPV) Brochure',  nec.Upload_project_SPV_brochure)
  );
  sections.push({ title:'Promoter & Project Profiles', icon:'user', files: profileFiles });

  // 2. Audited Financials — Promoter
  var finPromFiles = [].concat(
    drFiles('FY 2025-26', nec.Financial_Year_2025_26),
    drFiles('FY 2024-25', nec.Financial_Year_2024_25),
    drFiles('FY 2023-24', nec.Financial_Year_2023_24),
    drFiles('FY 2022-23', nec.Financial_Year_2022_23)
  );
  sections.push({ title:'Promoter Financials', icon:'list', files: finPromFiles });

  // 3. Audited Financials — SPV (merged from all projects or from nec)
  var finSpvFiles = [].concat(
    drFiles('FY 2025-26', nec.Project_SPV_Financial_Year_2025_26),
    drFiles('FY 2024-25', nec.Project_SPV_Financial_Year_2024_25),
    drFiles('FY 2023-24', nec.Project_SPV_Financial_Year_2023_24),
    drFiles('FY 2022-23', nec.Project_SPV_Financial_Year_2022_23)
  );
  sections.push({ title:'Project (SPV) Financials', icon:'list', files: finSpvFiles });

  // ── Project selector ───────────────────────────────────────────────
  var sel = DataRoomState.selectedProject;
  var projectNames = proj.map(function(p) { return p.name || 'Untitled Project'; });

  var drOptHtml = '<option value="">All Projects</option>' +
    projectNames.map(function(n) {
      return '<option value="' + esc(n) + '"' + (sel === n ? ' selected' : '') + '>' + esc(n) + '</option>';
    }).join('');

  var drChipHtml = sel
    ? '<div class="pipe-selector-chip">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7h18M7 12h10M11 17h2"/></svg>' +
        esc(sel) +
      '</div>'
    : '';

  var drSelectorHtml = proj.length
    ? '<div class="pipe-selector-wrap">' +
        '<span class="pipe-selector-label">Filter By Project</span>' +
        '<div class="pipe-selector">' +
          '<select onchange="dataRoomSelectProject(this.value)">' + drOptHtml + '</select>' +
          '<span class="pipe-selector-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></span>' +
        '</div>' +
        drChipHtml +
      '</div>'
    : '';

  // Per-project sections (filtered by selector)
  proj.forEach(function(p) {
    var r = p._raw || {};
    var pName = p.name || 'Untitled Project';
    if (sel && pName !== sel) return; // skip if not selected

    // 4. Project Images & Gallery
    var imgFiles = [].concat(
      drFiles('Cover Image', r.Project_Cover_Image),
      drFiles('Gallery',     r.Project_Gallery)
    );
    sections.push({ title: pName + ' — Images & Gallery', icon:'folder', files: imgFiles, isImages: true });

    // 5. Promoter KYC / KYB
    var kycPromFiles = [].concat(
      drFiles('Incorporation Certificate', r.Incorporation_Certificate),
      drFiles('MOA',                       r.MOA),
      drFiles('AOA',                       r.AOA),
      drFiles('GST Registration',          r.GST_Registration)
    );
    sections.push({ title: pName + ' — Promoter KYC / KYB', icon:'check', files: kycPromFiles });

    // 6. Project (SPV) KYC / KYB
    var kycSpvFiles = [].concat(
      drFiles('Incorporation Certificate', r.Incorporation_Certificate_spv),
      drFiles('MOA',                       r.MOA_spv),
      drFiles('AOA',                       r.AOA_spv),
      drFiles('GST Registration',          r.GST_Registration_spv)
    );
    sections.push({ title: pName + ' — Project (SPV) KYC / KYB', icon:'check', files: kycSpvFiles });

    // 7. Project Documents
    var docFiles = [].concat(
      drFiles('Feasibility Study Report', r.Detail_Project_Feasibility_Study_Report_Upload),
      drFiles('Legal Opinion',            r.Legal_Opinion),
      drFiles('Land Agreement',           r.Land_Agreement),
      drFiles('Regulatory Approval',      r.Regulatory_Approval),
      drFiles('Marketing Agreement',      r.Marketing_Agreement),
      drFiles('Present Certification(s)', r.Upload_Present_Certification_s),
      drFiles(zvp(r.Other_Document_Name_It) || 'Other Document', r.Other_Document)
    );
    sections.push({ title: pName + ' — Project Documents', icon:'folder', files: docFiles });
  });

  // ── Render ─────────────────────────────────────────────────────────
  var totalFiles = sections.reduce(function(s,g){ return s + g.files.length; }, 0);

  var body = sections.map(function(sec) {
    var iconSvg = svgIcon(sec.icon);
    var count   = sec.files.length;
    var countBadge = '<span class="dr-section-count">' + count + ' file' + (count !== 1 ? 's' : '') + '</span>';

    var filesHtml;
    if (!count) {
      filesHtml = '<div class="dr-empty">No files uploaded yet.</div>';
    } else if (sec.isImages) {
      // Image grid with thumbnails
      filesHtml = '<div class="dr-img-grid">' +
        sec.files.map(function(f) {
          var rawEsc  = esc(f.entry.rawUrl);
          var nameEsc = esc(f.entry.name);
          return '<img class="dr-img-thumb" ' +
            'src="" alt="' + nameEsc + '" ' +
            'data-raw="' + rawEsc + '" data-name="' + nameEsc + '" ' +
            'title="' + nameEsc + '" ' +
            'style="opacity:.4;transition:opacity .3s" ' +
            'onclick="drOpenFile(this)">';
        }).join('') +
      '</div>';
    } else {
      var fileIdx = 0;
      filesHtml = '<div class="dr-files-grid">' +
        sec.files.map(function(f) {
          fileIdx++;
          var safeId  = 'drbtn-' + fileIdx + '-' + (Math.random()*9999|0);
          var rawEsc  = esc(f.entry.rawUrl);
          var nameEsc = esc(f.entry.name);
          var img = isImage(f.entry.rawUrl);
          var imgId   = 'drfimg-' + fileIdx + '-' + (Math.random()*9999|0);
          var preview = img
            ? '<img class="dr-file-img" id="' + imgId + '" src="" alt="' + nameEsc + '" data-raw="' + rawEsc + '" style="opacity:.4;transition:opacity .3s">'
            : '<div class="dr-file-img-ph">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
              '</div>';
          // Store rawUrl and name in data attrs so onclick avoids escaping issues
          return '<div class="dr-file-card">' +
            preview +
            '<div class="dr-file-info">' +
              '<div class="dr-file-name" title="' + nameEsc + '">' + nameEsc + '</div>' +
              '<div class="dr-file-label">' + esc(f.label) + '</div>' +
            '</div>' +
            '<div class="dr-file-actions">' +
              '<button id="' + safeId + '" class="dr-file-btn" ' +
                'data-raw="' + rawEsc + '" data-name="' + nameEsc + '" ' +
                'onclick="drOpenFile(this)">' +
                '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
                ' Open / Download' +
              '</button>' +
            '</div>' +
          '</div>';
        }).join('') +
      '</div>';
    }

    return '<div class="dr-section">' +
      '<div class="dr-section-head">' +
        '<div class="dr-section-icon">' + iconSvg + '</div>' +
        '<span class="dr-section-title">' + esc(sec.title) + '</span>' +
        countBadge +
      '</div>' +
      filesHtml +
    '</div>';
  }).join('');

  return '<div class="page-header">' +
    '<div>' +
      '<div class="page-title">Data Room</div>' +
